<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Эпоха Империй</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #0a0a12;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(ellipse at top, #1a1a2e 0%, #0a0a12 70%);
            user-select: none;
        }

        .game-container {
            width: 100%;
            max-width: 430px;
            height: 100%;
            max-height: 850px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border-radius: 0;
            padding: 14px 14px 10px;
            border: none;
            box-shadow: none;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* ============ ВЕРХНЯЯ ПАНЕЛЬ ============ */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 2px 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
        }

        .header-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            font-weight: 600;
            color: #8395a7;
        }

        .header-item .value {
            color: #ffd700;
            font-size: 16px;
            min-width: 30px;
        }

        .header-item .icon {
            font-size: 17px;
        }

        /* ============ ЭПОХА ============ */
        .era-display {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 4px 10px;
            margin: 4px 0 3px;
            border: 1px solid rgba(255, 215, 0, 0.08);
            flex-shrink: 0;
        }

        .era-display .era-icon {
            font-size: 17px;
        }

        .era-display .era-name {
            font-size: 13px;
            font-weight: 700;
            color: #ffd700;
        }

        .era-display .era-next {
            font-size: 10px;
            color: #636e72;
        }

        /* ============ ПРОГРЕСС ============ */
        .level-progress {
            margin: 3px 0 4px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 2px 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .level-progress .level-text {
            font-size: 10px;
            font-weight: 700;
            color: #8395a7;
            white-space: nowrap;
            min-width: 35px;
        }

        .level-progress .level-text span {
            color: #ffd700;
        }

        .level-progress .level-bar {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
        }

        .level-progress .level-fill {
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            transition: width 0.3s ease;
            width: 0%;
        }

        .level-progress .level-percent {
            font-size: 9px;
            color: #8395a7;
            min-width: 28px;
            text-align: right;
        }

        /* ============ КЛИК ============ */
        .click-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
            padding: 6px 0;
        }

        .click-area {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #2a2a5e, #0f0f1f);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 3px solid rgba(255, 215, 0, 0.25);
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.04), inset 0 -4px 15px rgba(0, 0, 0, 0.4);
            transition: transform 0.07s, box-shadow 0.07s;
            position: relative;
            user-select: none;
            will-change: transform;
            touch-action: manipulation;
        }

        .click-area::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #ffd700, #ff6b6b, #ffd700);
            opacity: 0.15;
            z-index: -1;
            animation: rotateBorder 8s linear infinite;
        }

        @keyframes rotateBorder {
            to {
                transform: rotate(360deg);
            }
        }

        .click-area:active {
            transform: scale(0.93);
            border-color: #ffd700;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.1);
        }

        .click-area .emoji {
            font-size: 55px;
            line-height: 1;
            filter: drop-shadow(0 2px 15px rgba(255, 215, 0, 0.15));
            transition: transform 0.07s;
            will-change: transform;
        }

        .click-area:active .emoji {
            transform: scale(1.05);
        }

        .click-area .text {
            font-size: 11px;
            font-weight: 700;
            margin-top: 2px;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.05);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .click-area .badge {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(255, 215, 0, 0.12);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 9px;
            font-weight: 700;
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.06);
        }

        .click-area .boost-badge {
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            font-weight: 800;
            color: #ff6b6b;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 12px;
            border-radius: 12px;
            display: none;
            white-space: nowrap;
        }

        .click-area .boost-badge.show {
            display: block;
        }

        .click-area .energy-warning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            font-weight: 800;
            color: #ff6b6b;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
            animation: warnPulse 0.5s ease-in-out infinite alternate;
            display: none;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 12px;
            border-radius: 12px;
            white-space: nowrap;
        }

        .click-area .energy-warning.show {
            display: block;
        }

        @keyframes warnPulse {
            from {
                opacity: 0.7;
                transform: translate(-50%, -50%) scale(1);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.05);
            }
        }

        /* ============ АНИМАЦИЯ КЛИКА ============ */
        .fly-number {
            position: fixed;
            pointer-events: none;
            z-index: 999;
            font-size: 30px;
            font-weight: 800;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            animation: flyNumber 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            will-change: transform, opacity;
        }

        .fly-number.big {
            font-size: 44px;
            color: #ff6b6b;
            text-shadow: 0 0 40px rgba(255, 107, 107, 0.5);
        }

        .fly-number.era-up {
            font-size: 36px;
            color: #a29bfe;
            text-shadow: 0 0 50px rgba(162, 155, 254, 0.6);
        }

        @keyframes flyNumber {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(1.3);
            }
        }

        /* ============ СТАТИСТИКА ============ */
        .stats {
            display: flex;
            justify-content: space-between;
            padding: 4px 4px 5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            flex-shrink: 0;
        }

        .stats .item {
            text-align: center;
        }

        .stats .item .num {
            font-size: 16px;
            font-weight: 800;
            color: #ffd700;
            display: block;
            line-height: 1.2;
        }

        .stats .item .label {
            font-size: 9px;
            color: #8395a7;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* ============ ЭНЕРГИЯ ============ */
        .energy-section {
            margin: 3px 0 5px;
            flex-shrink: 0;
        }

        .energy-header {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #8395a7;
            padding: 0 2px;
        }

        .energy-header .current {
            color: #ffd700;
            font-weight: 600;
        }

        .energy-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            overflow: hidden;
        }

        .energy-fill {
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            transition: width 0.3s ease;
            width: 100%;
        }

        /* ============ НИЖНЕЕ МЕНЮ (5 КНОПОК) ============ */
        .bottom-menu {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            margin-top: 4px;
            flex-shrink: 0;
        }

        .bottom-menu .btn {
            background: rgba(255, 255, 255, 0.03);
            border: none;
            border-radius: 12px;
            padding: 10px 2px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.1s;
            color: #8395a7;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            will-change: transform;
            touch-action: manipulation;
        }

        .bottom-menu .btn:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.06);
        }

        .bottom-menu .btn .label {
            font-size: 7px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #636e72;
        }

        .bottom-menu .btn.active {
            color: #ffd700;
            border-color: rgba(255, 215, 0, 0.08);
            background: rgba(255, 215, 0, 0.04);
        }

        .bottom-menu .btn.raid {
            color: #fd79a8;
            animation: raidPulse 2s ease-in-out infinite;
        }

        @keyframes raidPulse {
            0%,
            100% {
                opacity: 0.8;
            }
            50% {
                opacity: 1;
            }
        }

        .bottom-menu .btn.exchange {
            color: #a29bfe;
        }

        /* ============ МОДАЛКИ ============ */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 14px;
            animation: fadeIn 0.2s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal {
            background: #16162e;
            border-radius: 24px;
            padding: 16px 14px;
            max-width: 400px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            animation: slideUp 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from {
                transform: translateY(15px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal .head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .modal .head h2 {
            color: #ffd700;
            font-size: 17px;
            font-weight: 700;
        }

        .modal .head .close {
            background: none;
            border: none;
            color: #8395a7;
            font-size: 20px;
            cursor: pointer;
            padding: 0 4px;
        }

        .modal .head .close:active {
            color: #ff6b6b;
        }

        .modal .balance {
            text-align: center;
            color: #8395a7;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .modal .balance span {
            color: #ffd700;
            font-weight: 700;
        }

        /* ============ ЭЛЕМЕНТЫ СПИСКОВ ============ */
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            padding: 8px 12px;
            margin-bottom: 5px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .item .info .name {
            font-size: 13px;
            font-weight: 600;
            color: #c8d6e5;
        }

        .item .info .desc {
            font-size: 10px;
            color: #8395a7;
        }

        .item .info .desc .highlight {
            color: #ffd700;
        }

        .item .action-btn {
            background: linear-gradient(135deg, #ffd700, #f0a500);
            border: none;
            border-radius: 10px;
            padding: 4px 14px;
            font-size: 11px;
            font-weight: 700;
            color: #0a0a12;
            cursor: pointer;
            transition: transform 0.07s;
        }

        .item .action-btn:active {
            transform: scale(0.92);
        }

        .item .action-btn.owned {
            background: #00b894;
            color: #fff;
            cursor: default;
        }

        .item .action-btn.disabled {
            background: #2d3436;
            color: #636e72;
            cursor: not-allowed;
        }

        .item .action-btn.exchange-btn {
            background: linear-gradient(135deg, #a29bfe, #6c5ce7);
            color: #fff;
        }

        .item .action-btn.exchange-btn:active {
            transform: scale(0.92);
        }

        .item .action-btn.exchange-btn.disabled {
            background: #2d3436;
            color: #636e72;
            cursor: not-allowed;
        }

        /* ============ НАБЕГ ============ */
        .raid-result {
            text-align: center;
            padding: 14px;
            border-radius: 14px;
            margin: 8px 0;
        }

        .raid-result.win {
            background: rgba(0, 184, 148, 0.12);
            border: 1px solid rgba(0, 184, 148, 0.2);
        }

        .raid-result.lose {
            background: rgba(255, 107, 107, 0.12);
            border: 1px solid rgba(255, 107, 107, 0.2);
        }

        .raid-result .big {
            font-size: 22px;
            font-weight: 800;
        }

        .raid-result .big.win {
            color: #00b894;
        }

        .raid-result .big.lose {
            color: #ff6b6b;
        }

        /* ============ ТОСТЫ ============ */
        .toast-container {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            pointer-events: none;
        }

        .toast {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            margin-top: 3px;
            animation: toastIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
            min-width: 120px;
            max-width: 85%;
        }

        .toast.success {
            border-color: rgba(0, 184, 148, 0.2);
        }

        .toast.error {
            border-color: rgba(255, 107, 107, 0.2);
        }

        .toast.level {
            border-color: rgba(255, 215, 0, 0.2);
            background: rgba(255, 215, 0, 0.05);
            font-size: 14px;
        }

        .toast.boost {
            border-color: rgba(255, 107, 107, 0.2);
            background: rgba(255, 107, 107, 0.05);
            font-size: 14px;
        }

        .toast.exchange {
            border-color: rgba(162, 155, 254, 0.2);
            background: rgba(162, 155, 254, 0.05);
            font-size: 14px;
        }

        .toast.era {
            border-color: rgba(162, 155, 254, 0.3);
            background: rgba(162, 155, 254, 0.1);
            font-size: 16px;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-12px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0) scale(1);
            }
        }

        .toast.fade-out {
            animation: toastOut 0.2s ease forwards;
        }

        @keyframes toastOut {
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px) scale(0.95);
            }
        }

        /* ============ АДАПТИВ ============ */
        @media (max-width: 400px) {
            .click-area {
                width: 160px;
                height: 160px;
            }

            .click-area .emoji {
                font-size: 40px;
            }

            .bottom-menu .btn {
                font-size: 15px;
                padding: 8px 2px;
            }

            .bottom-menu .btn .label {
                font-size: 6px;
            }

            .header-item {
                font-size: 12px;
            }

            .header-item .value {
                font-size: 14px;
            }

            .fly-number {
                font-size: 22px;
            }
        }

        @media (max-width: 360px) {
            .click-area {
                width: 130px;
                height: 130px;
            }

            .click-area .emoji {
                font-size: 32px;
            }

            .click-area .text {
                font-size: 9px;
            }

            .header-item {
                font-size: 10px;
            }

            .header-item .value {
                font-size: 12px;
            }

            .stats .item .num {
                font-size: 13px;
            }
        }

        @media (min-width: 500px) {
            .click-area {
                width: 240px;
                height: 240px;
            }

            .click-area .emoji {
                font-size: 70px;
            }

            .fly-number {
                font-size: 38px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container" id="app">
        <!-- ============ ВЕРХНЯЯ ПАНЕЛЬ ============ -->
        <div class="header">
            <div class="header-item"><span class="icon">🏆</span><span class="value" id="level">1</span></div>
            <div class="header-item"><span class="icon">💰</span><span class="value" id="coins">150</span></div>
            <div class="header-item"><span class="icon">⚡</span><span class="value" id="energyDisplay">250</span></div>
        </div>

        <!-- ============ ЭПОХА ============ -->
        <div class="era-display">
            <span class="era-icon" id="eraIcon">🏚️</span>
            <span class="era-name" id="eraName">Деревня</span>
            <span class="era-next" id="eraNext">▶ Lv.5</span>
        </div>

        <!-- ============ ПРОГРЕСС ============ -->
        <div class="level-progress">
            <div class="level-text">Lv.<span id="levelDisplay">1</span></div>
            <div class="level-bar"><div class="level-fill" id="levelProgressFill" style="width:0%"></div></div>
            <div class="level-percent" id="levelPercent">0%</div>
        </div>

        <!-- ============ КЛИК ============ -->
        <div class="click-wrapper">
            <div class="click-area" id="clickArea">
                <span class="badge" id="badge">Lv.1</span>
                <span class="emoji" id="clickEmoji">⚔️</span>
                <span class="text">ТАПАЙ</span>
                <span class="boost-badge" id="boostBadge"></span>
                <span class="energy-warning" id="energyWarning">⛔ НЕТ ЭНЕРГИИ</span>
            </div>
        </div>

        <!-- ============ СТАТИСТИКА ============ -->
        <div class="stats">
            <div class="item"><span class="num" id="clicks">0</span><span class="label">Кликов</span></div>
            <div class="item"><span class="num" id="perClick">1</span><span class="label">За клик</span></div>
            <div class="item"><span class="num" id="today">0</span><span class="label">За день</span></div>
        </div>

        <!-- ============ ЭНЕРГИЯ ============ -->
        <div class="energy-section">
            <div class="energy-header"><span>⚡ Энергия</span><span class="current"><span id="energyCurrent">250</span>/250</span></div>
            <div class="energy-bar"><div class="energy-fill" id="energyFill" style="width:100%"></div></div>
        </div>

        <!-- ============ НИЖНЕЕ МЕНЮ (5 КНОПОК) ============ -->
        <div class="bottom-menu">
            <button class="btn active" id="shopBtn">🛒<span class="label">Маг.</span></button>
            <button class="btn" id="skillsBtn">⚡<span class="label">Нав.</span></button>
            <button class="btn raid" id="raidBtn">⚔️<span class="label">Наб.</span></button>
            <button class="btn" id="airdropBtn">💎<span class="label">Aird.</span></button>
            <button class="btn exchange" id="exchangeBtn">🔄<span class="label">Обм.</span></button>
        </div>
    </div>

    <!-- ============ МОДАЛКИ ============ -->
    <div class="modal-overlay" id="shopModal"><div class="modal"><div class="head"><h2>🛒 Магазин</h2><button class="close" id="closeShop">✕</button></div><div class="balance">💰 <span id="shopBalance">150</span></div><div id="shopList"></div></div></div>
    <div class="modal-overlay" id="skillsModal"><div class="modal"><div class="head"><h2>⚡ Навыки</h2><button class="close" id="closeSkills">✕</button></div><div class="balance">💰 <span id="skillsBalance">150</span></div><div id="skillsList"></div></div></div>
    <div class="modal-overlay" id="raidModal"><div class="modal"><div class="head"><h2>⚔️ Набег</h2><button class="close" id="closeRaid">✕</button></div><div id="raidContent"></div></div></div>
    <div class="modal-overlay" id="exchangeModal"><div class="modal"><div class="head"><h2>🔄 Обмен</h2><button class="close" id="closeExchange">✕</button></div><div class="balance">💰 <span id="exchangeBalance">150</span></div><div id="exchangeList"></div></div></div>
    <div class="modal-overlay" id="airdropModal"><div class="modal"><div class="head"><h2>💎 Airdrop</h2><button class="close" id="closeAirdrop">✕</button></div><div id="airdropContent"></div></div></div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.requestFullscreen();

        // ============= ЭПОХИ =============
        const ERAS = [
            { id: 0, name: 'Деревня', icon: '🏚️', minLevel: 1, maxLevel: 4, bonus: 0 },
            { id: 1, name: 'Каменный век', icon: '🪨', minLevel: 5, maxLevel: 9, bonus: 1 },
            { id: 2, name: 'Бронзовый век', icon: '⚒️', minLevel: 10, maxLevel: 14, bonus: 2 },
            { id: 3, name: 'Железный век', icon: '🏛️', minLevel: 15, maxLevel: 19, bonus: 4 },
            { id: 4, name: 'Феодализм', icon: '⚜️', minLevel: 20, maxLevel: 24, bonus: 6 },
            { id: 5, name: 'Ренессанс', icon: '👑', minLevel: 25, maxLevel: 29, bonus: 10 },
            { id: 6, name: 'Просвещение', icon: '🚀', minLevel: 30, maxLevel: 34, bonus: 15 },
            { id: 7, name: 'Империя', icon: '💎', minLevel: 35, maxLevel: 39, bonus: 20 },
            { id: 8, name: 'Золотой век', icon: '🌌', minLevel: 40, maxLevel: 999, bonus: 30 }
        ];

        function getEra(level) {
            for (let era of ERAS) {
                if (level >= era.minLevel && level <= era.maxLevel) return era;
            }
            return ERAS[ERAS.length - 1];
        }

        function getNextEra(level) {
            for (let era of ERAS) {
                if (level < era.minLevel) return era;
            }
            return null;
        }

        // ============= ОПЫТ =============
        function getExpForLevel(lvl) {
            if (lvl <= 1) return 0;
            return 500 + (lvl - 1) * 500;
        }

        function getExpForNext() {
            if (state.level >= MAX_LEVEL) return Infinity;
            return getExpForLevel(state.level + 1);
        }

        // ============= ДАННЫЕ =============
        const MAX_LEVEL = 100;

        const BOOSTS = [
            { id: 'x2_2min', name: '⚡ Быстрый тап', price: 200, multiplier: 2, duration: 120, desc: 'x2 монет на 2 минуты' },
            { id: 'x3_2min', name: '🔥 Огненный тап', price: 600, multiplier: 3, duration: 120, desc: 'x3 монет на 2 минуты' },
            { id: 'x5_2min', name: '💎 Легендарный тап', price: 1500, multiplier: 5, duration: 120, desc: 'x5 монет на 2 минуты' },
            { id: 'x2exp_5min', name: '🧠 Мозговой штурм', price: 400, multiplier: 1, duration: 300, desc: 'x2 опыт на 5 минут', isExp: true },
            { id: 'x2_10min', name: '⏳ Замедление', price: 1200, multiplier: 2, duration: 600, desc: 'x2 монет на 10 минут' },
            { id: 'x8_1min', name: '🚀 Режим бога', price: 4000, multiplier: 8, duration: 60, desc: 'x8 монет на 1 минуту' },
            { id: 'energy_boost', name: '⚡ Энергетик', price: 150, multiplier: 0, duration: 0, desc: '+50 энергии мгновенно', isEnergy: true }
        ];

        const SHOP_ITEMS = [
            { id: 'amulet', name: '💎 Амулет удачи', price: 10000, desc: '+5% к монетам за клик', type: 'permanent' },
            { id: 'trophy', name: '🏆 Трофей героя', price: 25000, desc: '+10% к опыту', type: 'permanent' },
            { id: 'crystal', name: '⚡ Кристалл энергии', price: 50000, desc: '+50 к макс. энергии', type: 'permanent' },
            { id: 'grimoire', name: '🧙 Гримуар', price: 100000, desc: 'x1.5 к пассивному доходу', type: 'permanent' },
            { id: 'crown', name: '👑 Корона императора', price: 250000, desc: '+20% ко всем бонусам', type: 'permanent' },
            { id: 'sword', name: '🗡️ Меч легенды', price: 500000, desc: 'x2 к монетам за клик', type: 'permanent' },
            { id: 'shield', name: '🛡️ Щит бессмертия', price: 1000000, desc: 'Защита от потери монет', type: 'permanent' },
            { id: 'star', name: '🌟 Звезда судьбы', price: 5000000, desc: 'x3 ко всем бонусам', type: 'permanent' },
            { id: 'temple', name: '🏛️ Храм бесконечности', price: 10000000, desc: 'x5 к пассивному доходу', type: 'permanent' }
        ];

        const EXCHANGE_OFFERS = [
            { level: 50, coins: 100000, stars: 10, cooldown: 7 },
            { level: 60, coins: 200000, stars: 20, cooldown: 7 },
            { level: 70, coins: 500000, stars: 50, cooldown: 7 },
            { level: 80, coins: 1000000, stars: 100, cooldown: 7 },
            { level: 90, coins: 2000000, stars: 200, cooldown: 7 },
            { level: 100, coins: 5000000, stars: 500, cooldown: 7 }
        ];

        // ============= НАВЫКИ =============
        function getClickBonus(level) {
            if (level <= 0) return 0;
            if (level === 1) return 1;
            if (level === 2) return 2;
            return Math.pow(2, level - 1);
        }

        function getClickPrice(level) {
            if (level <= 0) return 50;
            if (level === 1) return 50;
            if (level === 2) return 100;
            return 50 * Math.pow(2, level - 1);
        }

        const SKILLS = [{
            id: 'click_upgrade',
            name: '⚡ Улучшение клика',
            price: 50,
            priceMultiplier: 0,
            maxLevel: Infinity,
            desc: (level) => `+${getClickBonus(level)} монеты (ур.${level})`,
            isPermanent: false,
            getPrice: (level) => getClickPrice(level)
        }, {
            id: 'income',
            name: '💰 Пассивный доход',
            price: 50,
            priceMultiplier: 1.5,
            maxLevel: Infinity,
            desc: (level) => `+1 монета/час (ур.${level})`,
            isPermanent: false
        }, {
            id: 'bookworm',
            name: '📚 Книжный червь',
            price: 300,
            priceMultiplier: 2,
            maxLevel: 20,
            desc: (level) => `+10% к опыту (ур.${level})`,
            isPermanent: false
        }, {
            id: 'regen',
            name: '🔄 Регенерация',
            price: 200,
            priceMultiplier: 2,
            maxLevel: 15,
            desc: (level) => `+1 энергия/мин (ур.${level})`,
            isPermanent: false
        }, {
            id: 'luck',
            name: '💎 Удача',
            price: 500,
            priceMultiplier: 2,
            maxLevel: 20,
            desc: (level) => `+1% шанс x2 (ур.${level})`,
            isPermanent: false
        }, {
            id: 'magic',
            name: '🧙 Магия',
            price: 10000,
            priceMultiplier: 0,
            maxLevel: 1,
            desc: () => 'x1.5 ко всем бонусам',
            isPermanent: true
        }, {
            id: 'dragon',
            name: '🐉 Наследие дракона',
            price: 25000,
            priceMultiplier: 0,
            maxLevel: 1,
            desc: () => 'x2 к пассивному доходу',
            isPermanent: true
        }, {
            id: 'timekeeper',
            name: '🕰️ Хранитель времени',
            price: 4000,
            priceMultiplier: 2,
            maxLevel: 10,
            desc: (level) => `+5% длительность бустов (ур.${level})`,
            isPermanent: false
        }];

        // ============= ФУНКЦИИ =============
        function getPassiveIncome() {
            let inc = 0;
            const incomeLevel = state.skills.income || 0;
            inc += incomeLevel;
            const dragon = state.skills.dragon || 0;
            if (dragon > 0) inc *= 2;
            return inc;
        }

        function getClickBonusFromSkill() {
            const level = state.skills.click_upgrade || 0;
            return getClickBonus(level);
        }

        function getBookwormBonus() {
            const level = state.skills.bookworm || 0;
            return level * 0.1;
        }

        function getRegenBonus() {
            const level = state.skills.regen || 0;
            return level;
        }

        function getLuckBonus() {
            const level = state.skills.luck || 0;
            return level;
        }

        function getMagicBonus() {
            return state.skills.magic || 0;
        }

        function getTimekeeperBonus() {
            const level = state.skills.timekeeper || 0;
            return level * 0.05;
        }

        function getBoostDurationMultiplier(base) {
            const bonus = getTimekeeperBonus();
            return base * (1 + bonus);
        }

        function getBoostMultiplier(base) {
            const magic = getMagicBonus();
            return base * (1 + (magic * 0.5));
        }

        function getEraBonus() {
            const era = getEra(state.level);
            return era.bonus || 0;
        }

        // ============= СОСТОЯНИЕ =============
        const state = {
            coins: 150,
            energy: 250,
            maxEnergy: 250,
            level: 1,
            exp: 0,
            clicks: 0,
            earnedToday: 0,
            raidCooldown: 0,
            boostActive: null,
            boostTimer: null,
            skills: {},
            shopItems: {},
            lastExchange: {}
        };

        // ============= DOM =============
        const $ = id => document.getElementById(id);
        const coinsEl = $('coins');
        const energyDisplay = $('energyDisplay');
        const energyFill = $('energyFill');
        const energyCurrent = $('energyCurrent');
        const levelEl = $('level');
        const levelDisplay = $('levelDisplay');
        const levelProgressFill = $('levelProgressFill');
        const levelPercent = $('levelPercent');
        const badge = $('badge');
        const clickEmoji = $('clickEmoji');
        const clicksEl = $('clicks');
        const todayEl = $('today');
        const perClickEl = $('perClick');
        const clickArea = $('clickArea');
        const eraIcon = $('eraIcon');
        const eraName = $('eraName');
        const eraNext = $('eraNext');
        const boostBadge = $('boostBadge');
        const energyWarning = $('energyWarning');

        // ============= ТОСТЫ =============
        let toastTimer = null;

        function toast(text, type = 'success', duration = 1500) {
            const c = $('toastContainer');
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = text;
            c.appendChild(el);
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                el.classList.add('fade-out');
                setTimeout(() => el.remove(), 200);
                toastTimer = null;
            }, duration);
        }

        // ============= ЛЕТАЮЩИЕ ЦИФРЫ =============
        function flyNumber(x, y, text, type = 'normal') {
            const el = document.createElement('div');
            let cls = 'fly-number';
            if (type === 'big') cls += ' big';
            if (type === 'era') cls += ' era-up';
            el.className = cls;
            el.textContent = text;
            el.style.left = (x - 15) + 'px';
            el.style.top = (y - 15) + 'px';
            el.style.setProperty('--tx', (Math.random() - 0.5) * 150 + 'px');
            el.style.setProperty('--ty', -Math.random() * 150 - 50 + 'px');
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        // ============= ОБНОВЛЕНИЕ UI =============
        function updateUI() {
            coinsEl.textContent = Math.floor(state.coins);
            energyDisplay.textContent = Math.floor(state.energy);
            energyCurrent.textContent = Math.floor(state.energy);
            const energyPercent = Math.min(100, (state.energy / state.maxEnergy) * 100);
            energyFill.style.width = energyPercent + '%';
            levelEl.textContent = state.level;
            levelDisplay.textContent = state.level;
            badge.textContent = 'Lv.' + state.level;

            const expNeeded = getExpForNext();
            if (state.level >= MAX_LEVEL) {
                levelProgressFill.style.width = '100%';
                levelPercent.textContent = 'MAX';
            } else {
                const p = Math.min(100, (state.exp / expNeeded) * 100);
                levelProgressFill.style.width = p + '%';
                levelPercent.textContent = Math.floor(p) + '%';
            }

            clicksEl.textContent = state.clicks;
            const clickBonus = getClickBonusFromSkill();
            const magic = getMagicBonus();
            const eraBonus = getEraBonus();
            const basePerClick = 1 + clickBonus + (magic * 0.5) + eraBonus;
            perClickEl.textContent = basePerClick.toFixed(1);
            todayEl.textContent = state.earnedToday;

            const era = getEra(state.level);
            const nextEra = getNextEra(state.level);
            eraIcon.textContent = era.icon;
            eraName.textContent = era.name;
            eraNext.textContent = nextEra ? '▶ Lv.' + nextEra.minLevel : '🏆 MAX';

            if (state.boostActive) {
                const boost = BOOSTS.find(b => b.id === state.boostActive);
                if (boost) {
                    const mult = boost.isExp ? 'x2 EXP' : 'x' + boost.multiplier;
                    boostBadge.textContent = '🔥 ' + mult;
                    boostBadge.classList.add('show');
                }
            } else {
                boostBadge.classList.remove('show');
            }

            if (state.energy <= 0) {
                energyWarning.classList.add('show');
            } else {
                energyWarning.classList.remove('show');
            }
        }

        // ============= ПРОВЕРКА УРОВНЯ =============
        function checkLevelUp() {
            if (state.level >= MAX_LEVEL) return false;
            const needed = getExpForNext();
            if (state.exp >= needed) {
                state.exp -= needed;
                state.level += 1;
                const era = getEra(state.level);
                toast('🎉 Lv.' + state.level + '! ' + era.icon + ' ' + era.name, 'level', 2000);

                const prevEra = getEra(state.level - 1);
                if (era.id !== prevEra.id) {
                    const bonus = getEraBonus();
                    toast('🏛️ НОВАЯ ЭПОХА! +' + bonus + ' монет за клик!', 'era', 3000);
                    flyNumber(window.innerWidth / 2, window.innerHeight / 2, '✨ +' + bonus + ' 🪙', 'era');
                }

                if (state.level === MAX_LEVEL) {
                    toast('👑 МАКСИМАЛЬНЫЙ УРОВЕНЬ!', 'level', 3000);
                }
                updateUI();
                return true;
            }
            return false;
        }

        // ============= КЛИК =============
        function handleClick(e) {
            if (state.energy <= 0) {
                energyWarning.classList.add('show');
                setTimeout(() => {
                    if (state.energy > 0) energyWarning.classList.remove('show');
                }, 1500);
                return;
            }

            let multiplier = 1;
            let expMultiplier = 1;

            if (state.boostActive) {
                const boost = BOOSTS.find(b => b.id === state.boostActive);
                if (boost) {
                    if (boost.isExp) {
                        expMultiplier = 2;
                    } else {
                        multiplier = getBoostMultiplier(boost.multiplier);
                    }
                }
            }

            const clickBonus = getClickBonusFromSkill();
            const magic = getMagicBonus();
            const luck = getLuckBonus();
            const eraBonus = getEraBonus();

            let earned = (1 + clickBonus + (magic * 0.5) + eraBonus) * multiplier;

            if (Math.random() * 100 < luck) {
                earned *= 2;
                flyNumber(e.clientX || window.innerWidth / 2, e.clientY || window.innerHeight / 2, '💎 x2', 'big');
            }

            state.coins += earned;
            state.energy -= 1;

            const regen = getRegenBonus();
            if (regen > 0 && Math.random() * 100 < regen) {
                state.energy += 1;
                if (state.energy > state.maxEnergy) state.energy = state.maxEnergy;
            }

            state.clicks += 1;
            state.earnedToday += earned;

            let expGain = 1;
            const bookworm = getBookwormBonus();
            expGain = Math.floor(expGain * (1 + bookworm) * expMultiplier);
            if (state.level < MAX_LEVEL) {
                state.exp += expGain;
                checkLevelUp();
            }

            const rect = clickArea.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;

            const text = earned >= 1 ? '+' + Math.floor(earned) : '+' + earned.toFixed(1);
            const isBig = multiplier > 1 || earned > 10;
            flyNumber(cx + (Math.random() - 0.5) * 80, cy + (Math.random() - 0.5) * 80, text, isBig ? 'big' : 'normal');

            if (multiplier > 1) {
                clickArea.style.borderColor = '#ff6b6b';
                setTimeout(() => { clickArea.style.borderColor = ''; }, 200);
            }

            updateUI();
        }

        // ============= МОДАЛКИ =============
        function openModal(id) { $(id).classList.add('active'); }

        function closeModal(id) { $(id).classList.remove('active'); }

        // ============= МАГАЗИН =============
        function openShop() {
            const list = $('shopList');
            list.innerHTML = '';

            const energyDiv = document.createElement('div');
            energyDiv.className = 'item';
            energyDiv.innerHTML = `
                <div class="info">
                    <div class="name">⚡ Восстановить энергию</div>
                    <div class="desc">+${state.maxEnergy} энергии за 150 монет</div>
                </div>
                <button class="action-btn ${state.coins < 150 ? 'disabled' : ''}" ${state.coins < 150 ? 'disabled' : ''}>
                    Купить 150💰
                </button>
            `;
            const energyBtn = energyDiv.querySelector('.action-btn');
            energyBtn.addEventListener('click', () => {
                if (state.coins < 150) { toast('⛔ Нет монет', 'error', 800); return; }
                if (state.energy >= state.maxEnergy) { toast('⚡ Энергия уже полная', 'error', 800); return; }
                state.coins -= 150;
                state.energy = state.maxEnergy;
                updateUI();
                openShop();
                toast('⚡ Энергия восстановлена!', 'success', 1000);
            });
            list.appendChild(energyDiv);

            BOOSTS.forEach(boost => {
                const isActive = state.boostActive === boost.id;
                const canBuy = state.coins >= boost.price && !isActive;

                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="info">
                        <div class="name">${boost.name}</div>
                        <div class="desc">${boost.desc}</div>
                        <div class="desc">💰 ${boost.price} монет</div>
                    </div>
                    <button class="action-btn ${isActive ? 'owned' : (!canBuy ? 'disabled' : '')}" ${isActive || !canBuy ? 'disabled' : ''}>
                        ${isActive ? '✅ Активен' : 'Купить'}
                    </button>
                `;
                const btn = div.querySelector('.action-btn');
                btn.addEventListener('click', () => {
                    if (isActive) return;
                    if (state.coins < boost.price) { toast('⛔ Нет монет', 'error', 800); return; }
                    if (boost.isEnergy) {
                        state.coins -= boost.price;
                        state.energy = Math.min(state.maxEnergy, state.energy + 50);
                        updateUI();
                        openShop();
                        toast('⚡ +50 энергии!', 'success', 1000);
                        return;
                    }
                    state.coins -= boost.price;
                    state.boostActive = boost.id;
                    if (state.boostTimer) clearTimeout(state.boostTimer);
                    const duration = getBoostDurationMultiplier(boost.duration);
                    state.boostTimer = setTimeout(() => {
                        state.boostActive = null;
                        state.boostTimer = null;
                        updateUI();
                        toast('⏳ Усиление закончилось!', 'error', 2000);
                    }, duration * 1000);
                    updateUI();
                    openShop();
                    toast('🔥 ' + boost.name + ' активирован!', 'boost', 2000);
                });
                list.appendChild(div);
            });

            SHOP_ITEMS.forEach(item => {
                const owned = state.shopItems[item.id] || 0;
                const canBuy = state.coins >= item.price && !owned;

                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="info">
                        <div class="name">${item.name}</div>
                        <div class="desc">${item.desc}</div>
                        <div class="desc">💰 ${item.price} монет</div>
                    </div>
                    <button class="action-btn ${owned ? 'owned' : (!canBuy ? 'disabled' : '')}" ${owned || !canBuy ? 'disabled' : ''}>
                        ${owned ? '✅ Куплен' : 'Купить'}
                    </button>
                `;
                const btn = div.querySelector('.action-btn');
                btn.addEventListener('click', () => {
                    if (owned) return;
                    if (state.coins < item.price) { toast('⛔ Нет монет', 'error', 800); return; }
                    state.coins -= item.price;
                    state.shopItems[item.id] = 1;

                    if (item.id === 'crystal') {
                        state.maxEnergy += 50;
                        state.energy += 50;
                    }

                    updateUI();
                    openShop();
                    toast('🎉 ' + item.name + ' куплен!', 'success', 2000);
                });
                list.appendChild(div);
            });

            $('shopBalance').textContent = Math.floor(state.coins);
            openModal('shopModal');
        }

        // ============= НАВЫКИ =============
        function openSkills() {
            const list = $('skillsList');
            list.innerHTML = '';
            SKILLS.forEach(skill => {
                const level = state.skills[skill.id] || 0;
                const isOwned = skill.isPermanent && level >= 1;
                const isMaxed = !skill.isPermanent && level >= skill.maxLevel;

                let price;
                if (skill.id === 'click_upgrade') {
                    price = getClickPrice(level);
                } else {
                    price = Math.floor(skill.price * Math.pow(skill.priceMultiplier || 1, level));
                }

                const canBuy = state.coins >= price && !isOwned && !isMaxed;

                let descText;
                if (skill.desc) {
                    descText = typeof skill.desc === 'function' ? skill.desc(level) : skill.desc;
                } else {
                    descText = '';
                }

                if (isOwned) descText += ' ✅';
                if (isMaxed) descText += ' MAX';

                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="info">
                        <div class="name">${skill.name}</div>
                        <div class="desc">${descText}</div>
                        <div class="desc">💰 ${isOwned ? 'Куплен' : (isMaxed ? 'Максимум' : price + ' монет')}</div>
                    </div>
                    <button class="action-btn ${isOwned ? 'owned' : (isMaxed ? 'owned' : (!canBuy ? 'disabled' : ''))}" ${isOwned || isMaxed || !canBuy ? 'disabled' : ''}>
                        ${isOwned ? '✅' : (isMaxed ? 'MAX' : 'Купить')}
                    </button>
                `;
                const btn = div.querySelector('.action-btn');
                btn.addEventListener('click', () => {
                    if (isOwned || isMaxed) return;
                    if (state.coins < price) { toast('⛔ Нет монет', 'error', 800); return; }
                    state.coins -= price;
                    state.skills[skill.id] = (state.skills[skill.id] || 0) + 1;
                    updateUI();
                    openSkills();
                    toast('⚡ ' + skill.name + ' улучшен!', 'success', 1000);
                });
                list.appendChild(div);
            });

            $('skillsBalance').textContent = Math.floor(state.coins);
            openModal('skillsModal');
        }

        // ============= ОБМЕННИК =============
        function openExchange() {
            const list = $('exchangeList');
            list.innerHTML = '';

            EXCHANGE_OFFERS.forEach(offer => {
                const canExchange = state.level >= offer.level && state.coins >= offer.coins;
                const lastExchange = state.lastExchange[offer.level] || 0;
                const cooldown = offer.cooldown * 24 * 60 * 60 * 1000;
                const now = Date.now();
                const isOnCooldown = now - lastExchange < cooldown;
                const available = canExchange && !isOnCooldown;

                let cooldownText = '';
                if (isOnCooldown) {
                    const left = Math.ceil((cooldown - (now - lastExchange)) / (24 * 60 * 60 * 1000));
                    cooldownText = '⏳ ' + left + ' дн.';
                }

                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="info">
                        <div class="name">${offer.coins.toLocaleString()} → ${offer.stars} ⭐</div>
                        <div class="desc">🔒 Lv.${offer.level}</div>
                        <div class="desc">${cooldownText ? cooldownText : '✅ Доступно'}</div>
                    </div>
                    <button class="action-btn exchange-btn ${!available ? 'disabled' : ''}" ${!available ? 'disabled' : ''}>
                        Обменять
                    </button>
                `;
                const btn = div.querySelector('.action-btn');
                btn.addEventListener('click', () => {
                    if (!available) return;
                    if (state.coins < offer.coins) { toast('⛔ Нет монет', 'error', 800); return; }
                    if (state.level < offer.level) { toast('⛔ Нужен Lv.' + offer.level, 'error', 800); return; }

                    state.coins -= offer.coins;
                    state.lastExchange[offer.level] = Date.now();

                    const user = tg.initDataUnsafe?.user;
                    const username = user?.username || 'Аноним';
                    const userId = user?.id || 'Неизвестно';

                    tg.sendData(JSON.stringify({
                        action: 'exchange',
                        userId: userId,
                        username: username,
                        level: state.level,
                        coins: offer.coins,
                        stars: offer.stars
                    }));

                    updateUI();
                    openExchange();
                    toast('📨 Запрос отправлен!', 'exchange', 3000);
                });
                list.appendChild(div);
            });

            $('exchangeBalance').textContent = Math.floor(state.coins);
            openModal('exchangeModal');
        }

        // ============= НАБЕГ =============
        function openRaid() {
            const now = Date.now();
            if (now - state.raidCooldown < 3600000) {
                const left = Math.ceil((3600000 - (now - state.raidCooldown)) / 60000);
                toast('⏳ ' + left + ' мин', 'error', 800);
                return;
            }
            const power = Math.floor(state.level * 2 + (state.skills.income || 0) * 0.5);
            const enemy = Math.floor(power * (0.5 + Math.random()));
            const win = power > enemy;
            const content = $('raidContent');
            let html = '';
            if (win) {
                const reward = Math.floor(100 + power * 2);
                state.coins += reward;
                html =
                    `<div class="raid-result win"><div class="big win">⚔️ ПОБЕДА!</div><div style="color:#ffd700;">+${reward} 💰</div></div>`;
                toast('⚔️ +' + reward, 'success', 1500);
            } else {
                const loss = Math.floor(50 + power * 0.5);
                const shield = state.shopItems.shield || 0;
                if (shield > 0) {
                    html =
                        `<div class="raid-result lose"><div class="big lose">🛡️ ОТРАЖЕНО!</div><div style="color:#00b894;">Щит спас монеты!</div></div>`;
                    toast('🛡️ Щит спас!', 'success', 2000);
                } else {
                    state.coins = Math.max(0, state.coins - loss);
                    html =
                        `<div class="raid-result lose"><div class="big lose">💀 ПОРАЖЕНИЕ!</div><div style="color:#ff6b6b;">-${loss} 💰</div></div>`;
                    toast('💀 -' + loss, 'error', 1500);
                }
            }
            state.raidCooldown = Date.now();
            updateUI();
            content.innerHTML = html +
                `<div style="text-align:center;color:#8395a7;font-size:11px;margin:8px 0;">⏳ 1 час</div>
                <button class="action-btn" style="width:100%;padding:10px;border:none;border-radius:12px;background:rgba(255,255,255,0.04);color:#c8d6e5;font-weight:700;cursor:pointer;" id="raidCloseBtn">✕ Закрыть</button>`;
            document.getElementById('raidCloseBtn').addEventListener('click', () => closeModal('raidModal'));
            openModal('raidModal');
        }

        // ============= AIRDROP =============
        function openAirdrop() {
            const content = $('airdropContent');
            if (state.level >= MAX_LEVEL) {
                content.innerHTML = `
                    <div style="text-align:center;padding:8px;">
                        <div style="font-size:28px;color:#ffd700;font-weight:800;">🎉 100 УРОВЕНЬ!</div>
                        <div style="color:#c8d6e5;margin:8px 0;">🪙 1000 TOKENS</div>
                        <div style="color:#a29bfe;margin:4px 0;">🏆 NFT "Покоритель"</div>
                        <button class="action-btn" style="margin-top:12px;padding:10px 20px;border:none;border-radius:12px;background:linear-gradient(135deg,#ffd700,#f0a500);color:#0a0a12;font-weight:700;font-size:14px;cursor:pointer;" id="claimAirdropBtn">💎 ЗАБРАТЬ</button>
                    </div>
                `;
                document.getElementById('claimAirdropBtn').addEventListener('click', () => {
                    toast('💎 Airdrop получен!', 'success', 3000);
                    closeModal('airdropModal');
                });
            } else {
                const p = Math.floor((state.level / MAX_LEVEL) * 100);
                content.innerHTML = `
                    <div style="text-align:center;padding:8px;">
                        <div style="font-size:28px;">💎</div>
                        <div style="color:#c8d6e5;margin:8px 0;">100 уровень → 1000 токенов + NFT</div>
                        <div style="margin:8px 0;background:rgba(0,0,0,0.2);border-radius:10px;padding:4px;">
                            <div style="height:4px;background:rgba(255,255,255,0.05);border-radius:20px;overflow:hidden;">
                                <div style="height:100%;width:${p}%;background:linear-gradient(90deg,#6c5ce7,#fd79a8);border-radius:20px;"></div>
                            </div>
                        </div>
                        <div style="color:#8395a7;font-size:12px;">${state.level}/${MAX_LEVEL} (${p}%)</div>
                    </div>
                `;
            }
            openModal('airdropModal');
        }

        // ============= АВТОМАТИКА =============
        setInterval(() => {
            if (state.energy < state.maxEnergy) {
                state.energy += 250 / 600;
                if (state.energy > state.maxEnergy) state.energy = state.maxEnergy;
                updateUI();
            }
        }, 1000);

        setInterval(() => {
            const regen = getRegenBonus();
            if (regen > 0 && state.energy < state.maxEnergy) {
                state.energy += regen / 60;
                if (state.energy > state.maxEnergy) state.energy = state.maxEnergy;
                updateUI();
            }
        }, 1000);

        setInterval(() => {
            const inc = getPassiveIncome();
            if (inc > 0) {
                state.coins += inc;
                updateUI();
                toast('💰 +' + inc + ' пассивный доход', 'success', 1000);
            }
        }, 60000);

        // ============= СОХРАНЕНИЕ =============
        function saveState() { localStorage.setItem('guild_state', JSON.stringify(state)); }

        function loadState() {
            try {
                const s = localStorage.getItem('guild_state');
                if (s) {
                    const data = JSON.parse(s);
                    Object.assign(state, data);
                    updateUI();
                }
            } catch (e) {}
        }

        const today = new Date().toDateString();
        if (localStorage.getItem('guild_reset') !== today) {
            state.earnedToday = 0;
            localStorage.setItem('guild_reset', today);
        }

        // ============ СОБЫТИЯ =============
        clickArea.addEventListener('click', handleClick);

        $('shopBtn').addEventListener('click', openShop);
        $('closeShop').addEventListener('click', () => closeModal('shopModal'));
        $('shopModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal('shopModal'); });

        $('skillsBtn').addEventListener('click', openSkills);
        $('closeSkills').addEventListener('click', () => closeModal('skillsModal'));
        $('skillsModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal('skillsModal'); });

        $('raidBtn').addEventListener('click', openRaid);
        $('closeRaid').addEventListener('click', () => closeModal('raidModal'));
        $('raidModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal('raidModal'); });

        $('exchangeBtn').addEventListener('click', openExchange);
        $('closeExchange').addEventListener('click', () => closeModal('exchangeModal'));
        $('exchangeModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal('exchangeModal'); });

        $('airdropBtn').addEventListener('click', openAirdrop);
        $('closeAirdrop').addEventListener('click', () => closeModal('airdropModal'));
        $('airdropModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal('airdropModal'); });

        // ============ ЗАПУСК =============
        loadState();
        updateUI();
        setInterval(saveState, 15000);

        console.log('⚔️ Эпоха Империй (полный экран)');
        console.log('🏆 Уровень:', state.level, '/', MAX_LEVEL);
        console.log('🏛️ Эпоха:', getEra(state.level).name);
        console.log('💰 Баланс:', Math.floor(state.coins));
        console.log('⚡ Энергия:', Math.floor(state.energy), '/', state.maxEnergy);
    </script>
</body>
</html>
