<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Эпоха Империй</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a12;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            background-image: radial-gradient(ellipse at top, #1a1a2e 0%, #0a0a12 70%);
            user-select: none;
            overflow: hidden;
        }
        .game-container {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 16px 14px 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        /* ============ ШАПКА ============ */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 4px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        .header-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            font-weight: 600;
            color: #8395a7;
        }
        .header-item .value {
            color: #ffd700;
            font-size: 15px;
            min-width: 30px;
        }
        .header-item .icon {
            font-size: 16px;
        }

        /* ============ ПРОГРЕСС ============ */
        .level-progress {
            margin: 8px 0 4px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 4px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .level-progress .level-text {
            font-size: 11px;
            font-weight: 700;
            color: #8395a7;
            white-space: nowrap;
            min-width: 50px;
        }
        .level-progress .level-text span {
            color: #ffd700;
        }
        .level-progress .level-bar {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
        }
        .level-progress .level-fill {
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            transition: width 0.3s ease;
            width: 0%;
        }
        .level-progress .level-percent {
            font-size: 10px;
            color: #8395a7;
            min-width: 35px;
            text-align: right;
        }

        /* ============ БАННЕР ============ */
        .banner {
            margin: 6px 0;
            padding: 6px 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #6c5ce7, #fd79a8);
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: opacity 0.2s;
        }
        .banner:active {
            opacity: 0.7;
        }
        .banner.claimed {
            background: #00b894;
        }

        /* ============ КЛИК ============ */
        .click-area {
            width: 170px;
            height: 170px;
            margin: 8px auto 6px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #2a2a5e, #0f0f1f);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 2.5px solid rgba(255, 215, 0, 0.25);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.04), inset 0 -4px 15px rgba(0, 0, 0, 0.4);
            transition: transform 0.07s, box-shadow 0.07s;
            position: relative;
            user-select: none;
            will-change: transform;
        }
        .click-area::before {
            content: '';
            position: absolute;
            inset: -2.5px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #ffd700, #ff6b6b, #ffd700);
            opacity: 0.15;
            z-index: -1;
            animation: rotateBorder 8s linear infinite;
        }
        @keyframes rotateBorder {
            to {
                transform: rotate(360deg);
            }
        }
        .click-area:active {
            transform: scale(0.93);
            border-color: #ffd700;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.1);
        }
        .click-area .emoji {
            font-size: 50px;
            line-height: 1;
            filter: drop-shadow(0 2px 15px rgba(255, 215, 0, 0.15));
            transition: transform 0.07s;
            will-change: transform;
        }
        .click-area:active .emoji {
            transform: scale(1.05);
        }
        .click-area .text {
            font-size: 10px;
            font-weight: 700;
            margin-top: 2px;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.05);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .click-area .badge {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(255, 215, 0, 0.12);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 9px;
            font-weight: 700;
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.06);
        }

        /* ============ СТАТИСТИКА ============ */
        .stats {
            display: flex;
            justify-content: space-between;
            padding: 4px 4px 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .stats .item {
            text-align: center;
        }
        .stats .item .num {
            font-size: 16px;
            font-weight: 800;
            color: #ffd700;
            display: block;
            line-height: 1.2;
        }
        .stats .item .label {
            font-size: 9px;
            color: #8395a7;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* ============ ЭНЕРГИЯ ============ */
        .energy-section {
            margin: 6px 0 8px;
        }
        .energy-header {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #8395a7;
            padding: 0 2px;
        }
        .energy-header .current {
            color: #ffd700;
            font-weight: 600;
        }
        .energy-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            overflow: hidden;
        }
        .energy-fill {
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            transition: width 0.3s ease;
            width: 100%;
        }

        /* ============ КНОПКИ (НИЖНЕЕ МЕНЮ) ============ */
        .bottom-menu {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 4px;
            margin-top: 6px;
        }
        .bottom-menu .btn {
            background: rgba(255, 255, 255, 0.03);
            border: none;
            border-radius: 12px;
            padding: 10px 2px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.1s;
            color: #8395a7;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            will-change: transform;
        }
        .bottom-menu .btn:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.06);
        }
        .bottom-menu .btn .label {
            font-size: 7px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #636e72;
        }
        .bottom-menu .btn.active {
            color: #ffd700;
            border-color: rgba(255, 215, 0, 0.08);
            background: rgba(255, 215, 0, 0.04);
        }
        .bottom-menu .btn.raid {
            color: #fd79a8;
            animation: raidPulse 2s ease-in-out infinite;
        }
        @keyframes raidPulse {
            0%,
            100% {
                opacity: 0.8;
            }
            50% {
                opacity: 1;
            }
        }
        .bottom-menu .btn.airdrop {
            color: #a29bfe;
        }

        /* ============ МОДАЛКИ ============ */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 14px;
            animation: fadeIn 0.2s ease;
        }
        .modal-overlay.active {
            display: flex;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: #16162e;
            border-radius: 24px;
            padding: 16px 14px;
            max-width: 400px;
            width: 100%;
            max-height: 75vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            animation: slideUp 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes slideUp {
            from {
                transform: translateY(15px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal .head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .modal .head h2 {
            color: #ffd700;
            font-size: 17px;
            font-weight: 700;
        }
        .modal .head .close {
            background: none;
            border: none;
            color: #8395a7;
            font-size: 20px;
            cursor: pointer;
            padding: 0 4px;
        }
        .modal .head .close:active {
            color: #ff6b6b;
        }
        .modal .balance {
            text-align: center;
            color: #8395a7;
            font-size: 12px;
            margin-bottom: 10px;
        }
        .modal .balance span {
            color: #ffd700;
            font-weight: 700;
        }

        /* ============ ЭЛЕМЕНТЫ СПИСКОВ ============ */
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            padding: 8px 12px;
            margin-bottom: 5px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }
        .item .info .name {
            font-size: 13px;
            font-weight: 600;
            color: #c8d6e5;
        }
        .item .info .desc {
            font-size: 10px;
            color: #8395a7;
        }
        .item .info .desc .highlight {
            color: #ffd700;
        }
        .item .action-btn {
            background: linear-gradient(135deg, #ffd700, #f0a500);
            border: none;
            border-radius: 10px;
            padding: 4px 14px;
            font-size: 11px;
            font-weight: 700;
            color: #0a0a12;
            cursor: pointer;
            transition: transform 0.07s;
        }
        .item .action-btn:active {
            transform: scale(0.92);
        }
        .item .action-btn.owned {
            background: #00b894;
            color: #fff;
            cursor: default;
        }
        .item .action-btn.disabled {
            background: #2d3436;
            color: #636e72;
            cursor: not-allowed;
        }
        .item .action-btn.active {
            background: #ffd700;
            color: #0a0a12;
        }

        /* ============ РЕЗУЛЬТАТ НАБЕГА ============ */
        .raid-result {
            text-align: center;
            padding: 14px;
            border-radius: 14px;
            margin: 8px 0;
        }
        .raid-result.win {
            background: rgba(0, 184, 148, 0.12);
            border: 1px solid rgba(0, 184, 148, 0.2);
        }
        .raid-result.lose {
            background: rgba(255, 107, 107, 0.12);
            border: 1px solid rgba(255, 107, 107, 0.2);
        }
        .raid-result .big {
            font-size: 22px;
            font-weight: 800;
        }
        .raid-result .big.win {
            color: #00b894;
        }
        .raid-result .big.lose {
            color: #ff6b6b;
        }

        /* ============ ТОСТЫ ============ */
        .toast-container {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            pointer-events: none;
        }
        .toast {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            margin-top: 3px;
            animation: toastIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
            min-width: 120px;
            max-width: 85%;
        }
        .toast.success {
            border-color: rgba(0, 184, 148, 0.2);
        }
        .toast.error {
            border-color: rgba(255, 107, 107, 0.2);
        }
        .toast.level {
            border-color: rgba(255, 215, 0, 0.2);
            background: rgba(255, 215, 0, 0.05);
            font-size: 14px;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-12px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0) scale(1);
            }
        }
        .toast.fade-out {
            animation: toastOut 0.2s ease forwards;
        }
        @keyframes toastOut {
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px) scale(0.95);
            }
        }

        /* ============ ЭФФЕКТЫ ============ */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 999;
            font-size: 22px;
            animation: particleFly 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            will-change: transform, opacity;
        }
        @keyframes particleFly {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(1.2);
            }
        }

        /* ============ СКИНЫ ============ */
        .skin-gold .click-area {
            border-color: #ffd700;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.08);
        }
        .skin-fire .click-area {
            border-color: #ff6b6b;
            box-shadow: 0 0 40px rgba(255, 107, 107, 0.08);
            background: radial-gradient(circle at 30% 30%, #3a1a1a, #1f0f0f);
        }
        .skin-cosmic .click-area {
            border-color: #a29bfe;
            box-shadow: 0 0 40px rgba(162, 155, 254, 0.08);
            background: radial-gradient(circle at 30% 30%, #1a1a3a, #0f0f1f);
        }
        .skin-legend .click-area {
            border-color: #fd79a8;
            box-shadow: 0 0 60px rgba(253, 121, 168, 0.1);
            background: radial-gradient(circle at 30% 30%, #2a1a2a, #1a0f1a);
        }
        .skin-legend .click-area::before {
            background: conic-gradient(from 0deg, #fd79a8, #ffd700, #fd79a8);
            opacity: 0.2;
        }

        /* ============ УГАДАЙ СЛОВО (МИНИ) ============ */
        .word-box .word-display {
            text-align: center;
            font-size: 28px;
            letter-spacing: 8px;
            font-weight: 700;
            color: #c8d6e5;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 12px;
            margin: 8px 0;
            font-family: 'Courier New', monospace;
        }
        .word-box .word-input {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            color: #c8d6e5;
            font-size: 16px;
            text-align: center;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        .word-box .word-input:focus {
            border-color: #ffd700;
        }
        .word-box .word-attempts {
            text-align: center;
            color: #8395a7;
            font-size: 12px;
            margin: 6px 0;
        }
        .word-box .word-attempts span {
            color: #ffd700;
        }
        .word-box .word-result {
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            min-height: 28px;
            color: #c8d6e5;
        }
        .word-box .word-result .reward {
            color: #ffd700;
        }
        .word-box .word-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 8px;
        }
        .word-box .word-buttons button {
            padding: 10px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.07s;
        }
        .word-box .word-buttons button:active {
            transform: scale(0.92);
        }
        .word-box .word-buttons .guess {
            background: linear-gradient(135deg, #ffd700, #f0a500);
            color: #0a0a12;
        }
        .word-box .word-buttons .close {
            background: rgba(255, 255, 255, 0.04);
            color: #c8d6e5;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .word-box .word-status {
            text-align: center;
            color: #8395a7;
            font-size: 11px;
            margin-top: 6px;
        }

        @media (max-width: 380px) {
            .click-area {
                width: 140px;
                height: 140px;
            }
            .click-area .emoji {
                font-size: 40px;
            }
            .bottom-menu .btn {
                font-size: 15px;
                padding: 8px 2px;
            }
            .bottom-menu .btn .label {
                font-size: 6px;
            }
            .header-item {
                font-size: 11px;
            }
            .header-item .value {
                font-size: 13px;
            }
        }
        @media (min-width: 460px) {
            .click-area {
                width: 200px;
                height: 200px;
            }
            .click-area .emoji {
                font-size: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container" id="app">
        <!-- ============ ШАПКА ============ -->
        <div class="header">
            <div class="header-item"><span class="icon">🏆</span><span class="value" id="level">1</span></div>
            <div class="header-item"><span class="icon">💰</span><span class="value" id="coins">150</span></div>
            <div class="header-item"><span class="icon">⚡</span><span class="value" id="energyDisplay">100</span></div>
        </div>

        <!-- ============ ПРОГРЕСС ============ -->
        <div class="level-progress">
            <div class="level-text">Lv.<span id="levelDisplay">1</span></div>
            <div class="level-bar"><div class="level-fill" id="levelProgressFill" style="width:0%"></div></div>
            <div class="level-percent" id="levelPercent">0%</div>
        </div>

        <!-- ============ БАННЕР ============ -->
        <div class="banner" id="banner">💎 Airdrop: 100 уровень → Токены + NFT</div>

        <!-- ============ КЛИК ============ -->
        <div class="click-area" id="clickArea">
            <span class="badge" id="badge">Lv.1</span>
            <span class="emoji" id="clickEmoji">⚔️</span>
            <span class="text">ТАПАЙ</span>
        </div>

        <!-- ============ СТАТИСТИКА ============ -->
        <div class="stats">
            <div class="item"><span class="num" id="clicks">0</span><span class="label">Кликов</span></div>
            <div class="item"><span class="num" id="power">0</span><span class="label">Мощь</span></div>
            <div class="item"><span class="num" id="today">0</span><span class="label">За день</span></div>
        </div>

        <!-- ============ ЭНЕРГИЯ ============ -->
        <div class="energy-section">
            <div class="energy-header"><span>⚡ Энергия</span><span class="current"><span id="energyCurrent">100</span>/100</span></div>
            <div class="energy-bar"><div class="energy-fill" id="energyFill" style="width:100%"></div></div>
        </div>

        <!-- ============ НИЖНЕЕ МЕНЮ (6 КНОПОК) ============ -->
        <div class="bottom-menu">
            <button class="btn" id="buildBtn">🏠<span class="label">Город</span></button>
            <button class="btn" id="armyBtn">⚔️<span class="label">Войска</span></button>
            <button class="btn" id="techBtn">🔬<span class="label">Технологии</span></button>
            <button class="btn" id="shopBtn">🛒<span class="label">Скины</span></button>
            <button class="btn raid" id="raidBtn">⚡<span class="label">Набег</span></button>
            <button class="btn airdrop" id="airdropBtn">💎<span class="label">Airdrop</span></button>
        </div>
    </div>

    <!-- ============ МОДАЛКИ ============ -->
    <!-- Скины -->
    <div class="modal-overlay" id="shopModal"><div class="modal"><div class="head"><h2>🛒 Скины</h2><button class="close" id="closeShop">✕</button></div><div class="balance">💰 <span id="shopBalance">150</span></div><div id="skinList"></div></div></div>
    <!-- Город -->
    <div class="modal-overlay" id="buildModal"><div class="modal"><div class="head"><h2>🏠 Город</h2><button class="close" id="closeBuild">✕</button></div><div class="balance">💰 <span id="buildBalance">150</span></div><div id="buildList"></div></div></div>
    <!-- Войска -->
    <div class="modal-overlay" id="armyModal"><div class="modal"><div class="head"><h2>⚔️ Войска</h2><button class="close" id="closeArmy">✕</button></div><div class="balance">💰 <span id="armyBalance">150</span></div><div id="armyList"></div></div></div>
    <!-- Технологии -->
    <div class="modal-overlay" id="techModal"><div class="modal"><div class="head"><h2>🔬 Технологии</h2><button class="close" id="closeTech">✕</button></div><div class="balance">💰 <span id="techBalance">150</span></div><div id="techList"></div></div></div>
    <!-- Набег -->
    <div class="modal-overlay" id="raidModal"><div class="modal"><div class="head"><h2>⚡ Набег</h2><button class="close" id="closeRaid">✕</button></div><div id="raidContent"></div></div></div>
    <!-- Airdrop -->
    <div class="modal-overlay" id="airdropModal"><div class="modal"><div class="head"><h2>💎 Airdrop</h2><button class="close" id="closeAirdrop">✕</button></div><div id="airdropContent"></div></div></div>

    <!-- ============ УГАДАЙ СЛОВО ============ -->
    <div class="modal-overlay" id="wordOverlay">
        <div class="modal word-box">
            <div class="head"><h2>🔤 Угадай слово</h2><button class="close" id="closeWord">✕</button></div>
            <div style="text-align:center;color:#8395a7;font-size:12px;" id="wordHint">Подсказка</div>
            <div class="word-display" id="wordDisplay">_ _ _</div>
            <input class="word-input" id="wordInput" maxlength="1" placeholder="Буква" autofocus>
            <div class="word-attempts">Попыток: <span id="wordAttempts">3</span></div>
            <div class="word-result" id="wordResult"></div>
            <div class="word-buttons">
                <button class="guess" id="wordGuess">🔍</button>
                <button class="close" id="wordClose">✕</button>
            </div>
            <div class="word-status" id="wordStatus">Новое слово каждый день</div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // ============= ДАННЫЕ =============
        const MAX_LEVEL = 100;

        const SKINS = [
            { id: 'default', name: 'Обычный', price: 0, bonus: 1, emoji: '⚔️' },
            { id: 'gold', name: 'Золотой', price: 3000, bonus: 1.2, emoji: '👑' },
            { id: 'fire', name: 'Огненный', price: 8000, bonus: 1.5, emoji: '🔥' },
            { id: 'cosmic', name: 'Космический', price: 15000, bonus: 2.0, emoji: '🌌' },
            { id: 'legend', name: 'Легендарный', price: 30000, bonus: 3.0, emoji: '💎' }
        ];

        const BUILDINGS = [
            { id: 'hut', name: 'Хижина', price: 100, minLevel: 1, power: 1, passive: 0 },
            { id: 'house', name: 'Дом', price: 500, minLevel: 2, power: 3, passive: 5 },
            { id: 'quarter', name: 'Квартал', price: 2000, minLevel: 4, power: 8, passive: 20 },
            { id: 'townhall', name: 'Ратуша', price: 5000, minLevel: 6, power: 15, passive: 50 },
            { id: 'castle', name: 'Замок', price: 15000, minLevel: 10, power: 30, passive: 100 },
            { id: 'citadel', name: 'Цитадель', price: 50000, minLevel: 15, power: 60, passive: 250 }
        ];

        const ARMY = [
            { id: 'militia', name: 'Ополченец', price: 200, minLevel: 1, power: 2, bonus: 0 },
            { id: 'swordsman', name: 'Мечник', price: 800, minLevel: 3, power: 5, bonus: 10 },
            { id: 'archer', name: 'Лучник', price: 2000, minLevel: 5, power: 10, bonus: 15 },
            { id: 'knight', name: 'Рыцарь', price: 5000, minLevel: 8, power: 20, bonus: 25 },
            { id: 'paladin', name: 'Паладин', price: 12000, minLevel: 12, power: 35, bonus: 40 },
            { id: 'royal_guard', name: 'Гвардия', price: 25000, minLevel: 16, power: 55, bonus: 60 }
        ];

        const TECHNOLOGIES = [
            { id: 'writing', name: 'Письменность', price: 500, minLevel: 2, effect: '+5% монет' },
            { id: 'metallurgy', name: 'Металлургия', price: 1500, minLevel: 4, effect: '+10% защита' },
            { id: 'architecture', name: 'Архитектура', price: 3000, minLevel: 6, effect: '-20% стройка' },
            { id: 'alchemy', name: 'Алхимия', price: 5000, minLevel: 8, effect: '+2 мон/клик' },
            { id: 'astrology', name: 'Астрология', price: 10000, minLevel: 10, effect: 'x2 здания' },
            { id: 'engineering', name: 'Инженерия', price: 18000, minLevel: 13, effect: '+50% реген' },
            { id: 'diplomacy', name: 'Дипломатия', price: 30000, minLevel: 17, effect: '+30% набеги' }
        ];

        // ============= ФУНКЦИИ =============
        function getExpForLevel(lvl) {
            if (lvl <= 1) return 0;
            return 1000 + (lvl - 2) * 200;
        }

        function getExpForNext() {
            if (state.level >= MAX_LEVEL) return Infinity;
            return getExpForLevel(state.level + 1);
        }

        function getSkinBonus() {
            const s = SKINS.find(s => s.id === state.skin);
            return s ? s.bonus : 1;
        }

        function calcPower() {
            let p = 0;
            for (const [id, lvl] of Object.entries(state.buildings)) {
                const b = BUILDINGS.find(b => b.id === id);
                if (b) p += b.power * lvl;
            }
            for (const [id, cnt] of Object.entries(state.army)) {
                const a = ARMY.find(a => a.id === id);
                if (a) p += a.power * cnt;
            }
            p += state.technologies.length * 3;
            return p;
        }

        function getPassiveIncome() {
            let inc = 0;
            for (const [id, lvl] of Object.entries(state.buildings)) {
                const b = BUILDINGS.find(b => b.id === id);
                if (b) inc += b.passive * lvl;
            }
            return inc;
        }

        // ============= СОСТОЯНИЕ =============
        const state = {
            coins: 150,
            energy: 100,
            maxEnergy: 100,
            level: 1,
            exp: 0,
            clicks: 0,
            earnedToday: 0,
            skin: 'default',
            ownedSkins: ['default'],
            buildings: {},
            army: {},
            technologies: [],
            raidCooldown: 0,
            wordCooldown: 0,
            airdropClaimed: false
        };

        // ============= DOM =============
        const $ = id => document.getElementById(id);
        const coinsEl = $('coins');
        const energyDisplay = $('energyDisplay');
        const energyFill = $('energyFill');
        const energyCurrent = $('energyCurrent');
        const levelEl = $('level');
        const levelDisplay = $('levelDisplay');
        const levelProgressFill = $('levelProgressFill');
        const levelPercent = $('levelPercent');
        const badge = $('badge');
        const clickEmoji = $('clickEmoji');
        const clicksEl = $('clicks');
        const powerEl = $('power');
        const todayEl = $('today');
        const clickArea = $('clickArea');
        const container = $('app');
        const banner = $('banner');

        // ============= ТОСТЫ =============
        let toastTimer = null;

        function toast(text, type = 'success', duration = 1500) {
            const c = $('toastContainer');
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = text;
            c.appendChild(el);
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                el.classList.add('fade-out');
                setTimeout(() => el.remove(), 200);
                toastTimer = null;
            }, duration);
        }

        // ============= ЭФФЕКТЫ =============
        function spawnParticles(x, y, emoji = '✨') {
            const el = document.createElement('div');
            el.className = 'particle';
            el.textContent = emoji;
            el.style.left = (x - 12) + 'px';
            el.style.top = (y - 12) + 'px';
            el.style.setProperty('--tx', (Math.random() - 0.5) * 80 + 'px');
            el.style.setProperty('--ty', -Math.random() * 80 - 20 + 'px');
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 600);
        }

        // ============= ОБНОВЛЕНИЕ UI =============
        function updateUI() {
            coinsEl.textContent = Math.floor(state.coins);
            energyDisplay.textContent = Math.floor(state.energy);
            energyCurrent.textContent = Math.floor(state.energy);
            energyFill.style.width = Math.min(100, (state.energy / state.maxEnergy) * 100) + '%';
            levelEl.textContent = state.level;
            levelDisplay.textContent = state.level;
            badge.textContent = 'Lv.' + state.level;

            const expNeeded = getExpForNext();
            if (state.level >= MAX_LEVEL) {
                levelProgressFill.style.width = '100%';
                levelPercent.textContent = 'MAX';
            } else {
                const p = Math.min(100, (state.exp / expNeeded) * 100);
                levelProgressFill.style.width = p + '%';
                levelPercent.textContent = Math.floor(p) + '%';
            }

            clicksEl.textContent = state.clicks;
            powerEl.textContent = calcPower();
            todayEl.textContent = state.earnedToday;

            // Скин
            const s = SKINS.find(s => s.id === state.skin);
            container.className = 'game-container skin-' + state.skin;
            clickEmoji.textContent = s ? s.emoji : '⚔️';

            // Баннер
            if (state.level >= MAX_LEVEL && !state.airdropClaimed) {
                banner.textContent = '🎉 100 УРОВЕНЬ! Забери Airdrop!';
                banner.style.background = 'linear-gradient(135deg, #ffd700, #ff6b6b)';
                banner.className = 'banner';
            } else if (state.airdropClaimed) {
                banner.textContent = '✅ Airdrop получен!';
                banner.className = 'banner claimed';
            } else {
                banner.textContent = '💎 Airdrop: 100 уровень → Токены + NFT';
                banner.style.background = 'linear-gradient(135deg, #6c5ce7, #fd79a8)';
                banner.className = 'banner';
            }
        }

        // ============= ПРОВЕРКА УРОВНЯ =============
        function checkLevelUp() {
            if (state.level >= MAX_LEVEL) return false;
            const needed = getExpForNext();
            if (state.exp >= needed) {
                state.exp -= needed;
                state.level += 1;
                toast('🎉 Lv.' + state.level + '!', 'level', 2000);
                if (state.level === MAX_LEVEL) {
                    toast('👑 100 УРОВЕНЬ! Забери Airdrop!', 'level', 3000);
                }
                updateUI();
                return true;
            }
            return false;
        }

        // ============= КЛИК =============
        function handleClick(e) {
            if (state.energy <= 0) {
                toast('⛔ Нет энергии', 'error', 800);
                return;
            }
            let earned = Math.floor(Math.random() * 4) + 2;
            earned = Math.floor(earned * getSkinBonus());

            state.coins += earned;
            state.energy -= 1;
            state.clicks += 1;
            state.earnedToday += earned;
            if (state.level < MAX_LEVEL) {
                state.exp += 1;
                checkLevelUp();
            }

            const rect = clickArea.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            spawnParticles(cx, cy, '✨');

            updateUI();
            if (state.clicks % 3 === 0) {
                toast('+' + earned + ' 🪙', 'success', 500);
            }
        }

        // ============= МОДАЛКИ =============
        function openModal(id) { $(id).classList.add('active'); }

        function closeModal(id) { $(id).classList.remove('active'); }

        // ============= МАГАЗИН =============
        function openShop() {
            const list = $('skinList');
            list.innerHTML = '';
            SKINS.forEach(skin => {
                const owned = state.ownedSkins.includes(skin.id);
                const active = state.skin === skin.id;
                const can = state.coins >= skin.price && !owned && skin.price > 0;
                const div = document.createElement('div');
                div.className = 'item';
                let status = '';
                if (skin.price === 0) status = '🆓';
                else if (owned && active) status = '✅';
                else if (owned) status = '✔️';
                else status = skin.price + '💰';
                div.innerHTML = `
                    <div class="info">
                        <div class="name">${skin.emoji} ${skin.name}</div>
                        <div class="desc">${skin.bonus > 1 ? '+' + Math.round((skin.bonus-1)*100) + '%' : 'Обычный'}</div>
                    </div>
                    <button class="action-btn ${owned ? (active ? 'active' : 'owned') : (!can && skin.price > 0 ? 'disabled' : '')}" ${!can && !owned && skin.price > 0 ? 'disabled' : ''}>
                        ${owned ? (active ? '✅' : 'Выбрать') : (skin.price === 0 ? '✅' : 'Купить')}
                    </button>
                `;
                const btn = div.querySelector('.action-btn');
                btn.addEventListener('click', () => {
                    if (owned) { state.skin = skin.id;
                        updateUI();
                        openShop();
                        toast('✅ ' + skin.name, 'success', 800); return; }
                    if (skin.price === 0) { state.skin = 'default';
                        updateUI();
                        openShop(); return; }
                    if (state.coins < skin.price) { toast('⛔ Нет монет', 'error', 800); return; }
                    state.coins -= skin.price;
                    state.ownedSkins.push(skin.id);
                    state.skin = skin.id;
                    updateUI();
                    openShop();
                    toast('🎉 ' + skin.name, 'success', 1000);
                });
                list.appendChild(div);
            });
            $('shopBalance').textContent = state.coins;
            openModal('shopModal');
        }

        // ============= ГОРОД =============
        function openBuild() {
            const list = $('buildList');
            list.innerHTML = '';
            BUILDINGS.forEach(b => {
                const lvl = state.buildings[b.id] || 0;
                const can = state.coins >= b.price && state.level >= b.minLevel;
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="info">
                        <div class="name">${b.name} <span style="color:#8395a7;font-size:10px;">Ур.${lvl}</span></div>
                        <div class="desc">⚔️ +${b.power} ${b.passive > 0 ? '💰 +' + b.passive + '/ч' : ''}</div>
                    </div>
                    <button class="action-btn ${!can ? 'disabled' : ''}" ${!can ? 'disabled' : ''}>
                        ${lvl > 0 ? '⬆️' : '🏗️'} ${b.price}💰
                    </button>
                `;
                const btn = div.querySelector('.action-btn');
                btn.addEventListener('click', () => {
                    if (state.coins < b.price) { toast('⛔ Нет монет', 'error', 800); return; }
                    if (state.level < b.minLevel) { toast('⛔ Lv.' + b.minLevel, 'error', 800); return; }
                    state.coins -= b.price;
                    state.buildings[b.id] = (state.buildings[b.id] || 0) + 1;
                    updateUI();
                    openBuild();
                    toast('🏗️ ' + b.name, 'success', 800);
                });
                list.appendChild(div);
            });
            $('buildBalance').textContent = state.coins;
            openModal('buildModal');
        }

        // ============= ВОЙСКА =============
        function openArmy() {
            const list = $('armyList');
            list.innerHTML = '';
            ARMY.forEach(a => {
                const cnt = state.army[a.id] || 0;
                const can = state.coins >= a.price && state.level >= a.minLevel;
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="info">
                        <div class="name">${a.name} <span style="color:#8395a7;font-size:10px;">${cnt} шт</span></div>
                        <div class="desc">⚔️ +${a.power} ${a.bonus > 0 ? '🔥 +' + a.bonus + '%' : ''}</div>
                    </div>
                    <button class="action-btn ${!can ? 'disabled' : ''}" ${!can ? 'disabled' : ''}>
                        ${a.price}💰
                    </button>
                `;
                const btn = div.querySelector('.action-btn');
                btn.addEventListener('click', () => {
                    if (state.coins < a.price) { toast('⛔ Нет монет', 'error', 800); return; }
                    if (state.level < a.minLevel) { toast('⛔ Lv.' + a.minLevel, 'error', 800); return; }
                    state.coins -= a.price;
                    state.army[a.id] = (state.army[a.id] || 0) + 1;
                    updateUI();
                    openArmy();
                    toast('⚔️ ' + a.name, 'success', 800);
                });
                list.appendChild(div);
            });
            $('armyBalance').textContent = state.coins;
            openModal('armyModal');
        }

        // ============= ТЕХНОЛОГИИ =============
        function openTech() {
            const list = $('techList');
            list.innerHTML = '';
            TECHNOLOGIES.forEach(t => {
                const learned = state.technologies.includes(t.id);
                const can = !learned && state.coins >= t.price && state.level >= t.minLevel;
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="info">
                        <div class="name">${t.name}</div>
                        <div class="desc">${learned ? '✅' : t.price + '💰'} ${t.effect}</div>
                    </div>
                    <button class="action-btn ${learned ? 'owned' : (!can ? 'disabled' : '')}" ${learned || !can ? 'disabled' : ''}>
                        ${learned ? '✅' : '📖'}
                    </button>
                `;
                const btn = div.querySelector('.action-btn');
                btn.addEventListener('click', () => {
                    if (learned) return;
                    if (state.coins < t.price) { toast('⛔ Нет монет', 'error', 800); return; }
                    if (state.level < t.minLevel) { toast('⛔ Lv.' + t.minLevel, 'error', 800); return; }
                    state.coins -= t.price;
                    state.technologies.push(t.id);
                    updateUI();
                    openTech();
                    toast('🔬 ' + t.name, 'success', 1000);
                });
                list.appendChild(div);
            });
            $('techBalance').textContent = state.coins;
            openModal('techModal');
        }

        // ============= НАБЕГ =============
        function openRaid() {
            const now = Date.now();
            if (now - state.raidCooldown < 3600000) {
                const left = Math.ceil((3600000 - (now - state.raidCooldown)) / 60000);
                toast('⏳ ' + left + ' мин', 'error', 800);
                return;
            }
            const p = calcPower();
            const enemy = Math.floor(p * (0.5 + Math.random()));
            const win = p > enemy;
            const content = $('raidContent');
            let html = '';
            if (win) {
                const reward = Math.floor(100 + p * 2);
                state.coins += reward;
                html =
                    `<div class="raid-result win"><div class="big win">⚔️ ПОБЕДА!</div><div style="color:#ffd700;">+${reward} 💰</div></div>`;
                toast('⚔️ +' + reward, 'raid', 1500);
            } else {
                const loss = Math.floor(50 + p * 0.5);
                state.coins = Math.max(0, state.coins - loss);
                html =
                    `<div class="raid-result lose"><div class="big lose">💀 ПОРАЖЕНИЕ!</div><div style="color:#ff6b6b;">-${loss} 💰</div></div>`;
                toast('💀 -' + loss, 'error', 1500);
            }
            state.raidCooldown = Date.now();
            updateUI();
            content.innerHTML = html +
                `<div style="text-align:center;color:#8395a7;font-size:11px;margin:8px 0;">⏳ 1 час</div>
                <button class="action-btn" style="width:100%;padding:10px;border:none;border-radius:12px;background:rgba(255,255,255,0.04);color:#c8d6e5;font-weight:700;cursor:pointer;" id="raidCloseBtn">✕ Закрыть</button>`;
            document.getElementById('raidCloseBtn').addEventListener('click', () => closeModal('raidModal'));
            openModal('raidModal');
        }

        // ============= AIRDROP =============
        function openAirdrop() {
            const content = $('airdropContent');
            if (state.level >= MAX_LEVEL && !state.airdropClaimed) {
                content.innerHTML = `
                    <div style="text-align:center;padding:8px;">
                        <div style="font-size:28px;color:#ffd700;font-weight:800;">🎉 100 УРОВЕНЬ!</div>
                        <div style="color:#c8d6e5;margin:8px 0;">🪙 1000 TOKENS</div>
                        <div style="color:#a29bfe;margin:4px 0;">🏆 NFT "Покоритель"</div>
                        <button class="action-btn" style="margin-top:12px;padding:10px 20px;border:none;border-radius:12px;background:linear-gradient(135deg,#ffd700,#f0a500);color:#0a0a12;font-weight:700;font-size:14px;cursor:pointer;" id="claimAirdropBtn">💎 ЗАБРАТЬ</button>
                    </div>
                `;
                document.getElementById('claimAirdropBtn').addEventListener('click', () => {
                    state.airdropClaimed = true;
                    updateUI();
                    closeModal('airdropModal');
                    toast('💎 Airdrop получен!', 'success', 3000);
                });
            } else if (state.airdropClaimed) {
                content.innerHTML =
                    `<div style="text-align:center;padding:16px;"><div style="font-size:28px;">✅</div><div style="color:#c8d6e5;">Airdrop получен!</div></div>`;
            } else {
                const p = Math.floor((state.level / MAX_LEVEL) * 100);
                content.innerHTML = `
                    <div style="text-align:center;padding:8px;">
                        <div style="font-size:28px;">💎</div>
                        <div style="color:#c8d6e5;margin:8px 0;">100 уровень → 1000 токенов + NFT</div>
                        <div style="margin:8px 0;background:rgba(0,0,0,0.2);border-radius:10px;padding:4px;">
                            <div style="height:4px;background:rgba(255,255,255,0.05);border-radius:20px;overflow:hidden;">
                                <div style="height:100%;width:${p}%;background:linear-gradient(90deg,#6c5ce7,#fd79a8);border-radius:20px;"></div>
                            </div>
                        </div>
                        <div style="color:#8395a7;font-size:12px;">${state.level}/${MAX_LEVEL} (${p}%)</div>
                    </div>
                `;
            }
            openModal('airdropModal');
        }

        // ============= УГАДАЙ СЛОВО =============
        function getDailyWord() {
            const words = [
                { word: 'ЗАМОК', hint: '🏰' }, { word: 'РЫЦАРЬ', hint: '⚔️' },
                { word: 'КОРОНА', hint: '👑' }, { word: 'МЕЧ', hint: '⚔️' },
                { word: 'ЩИТ', hint: '🛡️' }, { word: 'ТРОН', hint: '👑' },
                { word: 'ГИЛЬДИЯ', hint: '🏛️' }, { word: 'КРЕСТ', hint: '✝️' },
                { word: 'ПЛАЩ', hint: '🧥' }, { word: 'КОЛЧАН', hint: '🏹' }
            ];
            const d = new Date();
            const s = new Date(d.getFullYear(), 0, 0);
            return words[Math.floor((d - s) / 86400000) % words.length];
        }

        let wData = null,
            wGuessed = [],
            wAttempts = 3,
            wOver = false;

        function openWord() {
            const now = Date.now();
            if (now - state.wordCooldown < 86400000) { toast('⏳ Завтра', 'error', 800); return; }
            const today = new Date().toDateString();
            if (localStorage.getItem('word_guessed_' + today) === 'true') { toast('✅ Уже сегодня', 'error', 800); return; }
            wData = getDailyWord();
            wGuessed = [];
            wAttempts = 3;
            wOver = false;
            $('wordHint').textContent = '💡 ' + wData.hint;
            $('wordAttempts').textContent = wAttempts;
            $('wordResult').textContent = '';
            $('wordInput').value = '';
            $('wordInput').disabled = false;
            $('wordGuess').disabled = false;
            $('wordStatus').textContent = '3 попытки';
            updateWordDisplay();
            openModal('wordOverlay');
            setTimeout(() => $('wordInput').focus(), 300);
        }

        function updateWordDisplay() {
            let d = '';
            for (let c of wData.word) d += (wGuessed.includes(c) ? c : '_') + ' ';
            $('wordDisplay').textContent = d.trim();
        }

        function guessWord() {
            if (wOver || !wData) return;
            const input = $('wordInput').value.toUpperCase().trim();
            if (!input) { toast('Введи букву', 'error', 800); return; }
            if (input.length > 1) {
                if (input === wData.word) { winWord(); return; }
                wAttempts--;
                $('wordAttempts').textContent = wAttempts;
                toast('❌ ' + wAttempts, 'error', 800);
                if (wAttempts <= 0) loseWord();
                return;
            }
            const l = input[0];
            if (wGuessed.includes(l)) { toast('Уже есть', 'error', 800); return; }
            if (wData.word.includes(l)) {
                wGuessed.push(l);
                updateWordDisplay();
                toast('✅ ' + l, 'success', 800);
                let all = true;
                for (let c of wData.word) { if (!wGuessed.includes(c)) { all = false; break; } }
                if (all) winWord();
            } else {
                wAttempts--;
                $('wordAttempts').textContent = wAttempts;
                toast('❌ ' + l, 'error', 800);
                if (wAttempts <= 0) loseWord();
            }
            $('wordInput').value = '';
            setTimeout(() => $('wordInput').focus(), 100);
        }

        function winWord() {
            wOver = true;
            $('wordInput').disabled = true;
            $('wordGuess').disabled = true;
            const reward = 1000;
            state.coins += reward;
            state.wordCooldown = Date.now();
            localStorage.setItem('word_guessed_' + new Date().toDateString(), 'true');
            $('wordResult').innerHTML = '🎉 <span class="reward">+' + reward + '💰</span>';
            $('wordStatus').textContent = '🏆 Завтра новое!';
            updateUI();
            toast('💰 +' + reward, 'success', 2000);
        }

        function loseWord() {
            wOver = true;
            $('wordInput').disabled = true;
            $('wordGuess').disabled = true;
            $('wordResult').innerHTML = '😢 Слово: ' + wData.word;
            $('wordStatus').textContent = '🔄 Завтра!';
        }

        // ============= АВТОМАТИКА =============
        setInterval(() => {
            if (state.energy < state.maxEnergy) {
                state.energy += 1;
                if (state.energy > state.maxEnergy) state.energy = state.maxEnergy;
                updateUI();
            }
        }, 30000);

        setInterval(() => {
            const inc = getPassiveIncome();
            if (inc > 0) { state.coins += inc;
                updateUI(); }
        }, 60000);

        // ============= СОХРАНЕНИЕ =============
        function saveState() { localStorage.setItem('guild_state', JSON.stringify(state)); }

        function loadState() {
            try {
                const s = localStorage.getItem('guild_state');
                if (s) { Object.assign(state, JSON.parse(s));
                    updateUI(); }
            } catch (e) {}
        }

        const today = new Date().toDateString();
        if (localStorage.getItem('guild_reset') !== today) {
            state.earnedToday = 0;
            localStorage.setItem('guild_reset', today);
        }

        // ============= СОБЫТИЯ =============
        clickArea.addEventListener('click', handleClick);
        $('shopBtn').addEventListener('click', openShop);
        $('closeShop').addEventListener('click', () => closeModal('shopModal'));
        $('shopModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal('shopModal'); });
        $('buildBtn').addEventListener('click', openBuild);
        $('closeBuild').addEventListener('click', () => closeModal('buildModal'));
        $('buildModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal('buildModal'); });
        $('armyBtn').addEventListener('click', openArmy);
        $('closeArmy').addEventListener('click', () => closeModal('armyModal'));
        $('armyModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal('armyModal'); });
        $('techBtn').addEventListener('click', openTech);
        $('closeTech').addEventListener('click', () => closeModal('techModal'));
        $('techModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal('techModal'); });
        $('raidBtn').addEventListener('click', openRaid);
        $('closeRaid').addEventListener('click', () => closeModal('raidModal'));
        $('raidModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal('raidModal'); });
        $('airdropBtn').addEventListener('click', openAirdrop);
        banner.addEventListener('click', openAirdrop);
        $('closeAirdrop').addEventListener('click', () => closeModal('airdropModal'));
        $('airdropModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal('airdropModal'); });

        // Слово
        $('wordBtn').addEventListener('click', openWord);
        $('wordGuess').addEventListener('click', guessWord);
        $('wordInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') guessWord(); });
        $('closeWord').addEventListener('click', () => closeModal('wordOverlay'));
        $('wordClose').addEventListener('click', () => closeModal('wordOverlay'));
        $('wordOverlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal('wordOverlay'); });

        // ============= ЗАПУСК =============
        loadState();
        updateUI();
        setInterval(saveState, 15000);

        console.log('⚔️ Эпоха Империй (минимализм)');
        console.log('🏆 Уровень:', state.level, '/', MAX_LEVEL);
        console.log('💰 Баланс:', state.coins);
    </script>
</body>
</html>
