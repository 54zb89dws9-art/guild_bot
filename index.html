<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Эпоха Империй</title>
    <style>
        /* --- Общие стили --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            background: #0a0a12;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
            background-image: radial-gradient(ellipse at top, #1a1a2e 0%, #0a0a12 70%);
            overflow: hidden;
        }
        #app {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px 16px 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: all 0.3s ease;
        }

        /* --- Верхняя панель --- */
        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 0 4px;
        }
        .stat {
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 14px;
            border-radius: 40px;
            color: #8395a7;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stat .icon { font-size: 18px; }
        .stat .value {
            color: #ffd700;
            font-size: 16px;
            min-width: 20px;
        }

        /* --- Информация об эпохе --- */
        .era-display {
            margin-bottom: 8px;
            padding: 6px 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            display: inline-block;
            border: 1px solid rgba(255, 215, 0, 0.08);
        }
        .era-name {
            color: #ffd700;
            font-size: 18px;
            font-weight: 700;
        }
        .era-sub {
            color: #8395a7;
            font-size: 12px;
            margin-left: 6px;
        }

        /* --- Прогресс уровня --- */
        .progress-container {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 40px;
            padding: 4px 8px;
            margin: 10px 0 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .progress-label {
            color: #c8d6e5;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
        }
        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            border-radius: 20px;
            transition: width 0.3s ease;
        }
        .progress-text {
            color: #8395a7;
            font-size: 12px;
            font-weight: 600;
            min-width: 50px;
            text-align: right;
        }

        /* --- КНОПКА (изображение) --- */
        .click-area {
            width: 190px;
            height: 190px;
            margin: 8px auto 14px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            border: 3px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.04);
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            will-change: transform;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .click-area:active {
            transform: scale(0.93);
            border-color: #ffd700;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.1);
        }
        /* Бейдж уровня на кнопке */
        .click-area .badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #0a0a12;
            color: #ffd700;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 40px;
            border: 2px solid #ffd700;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
        }
        /* Буст-бейдж */
        .click-area .boost-badge {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #ff6b6b;
            font-size: 12px;
            font-weight: 800;
            padding: 4px 14px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            display: none;
            white-space: nowrap;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }
        .click-area .boost-badge.show { display: block; }

        /* Предупреждение об энергии */
        .energy-warning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            padding: 8px 16px;
            border-radius: 40px;
            color: #ff6b6b;
            font-weight: 800;
            font-size: 14px;
            border: 1px solid rgba(255, 107, 107, 0.5);
            display: none;
            white-space: nowrap;
            pointer-events: none;
        }
        .energy-warning.show { display: block; }

        /* --- Нижняя статистика --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin: 10px 0 12px;
        }
        .stats-grid .item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 8px 4px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .stats-grid .num {
            color: #ffd700;
            font-size: 20px;
            font-weight: 800;
            display: block;
            line-height: 1.2;
        }
        .stats-grid .label {
            color: #8395a7;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* --- Энергия --- */
        .energy-section {
            margin: 6px 0 10px;
        }
        .energy-header {
            display: flex;
            justify-content: space-between;
            color: #8395a7;
            font-size: 12px;
            padding: 0 4px;
        }
        .energy-header .current { color: #ffd700; font-weight: 600; }
        .energy-bar {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            overflow: hidden;
        }
        .energy-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border-radius: 20px;
            transition: width 0.3s ease;
        }

        /* --- Нижнее меню --- */
        .bottom-menu {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-top: 8px;
        }
        .bottom-menu button {
            background: rgba(255, 255, 255, 0.04);
            border: none;
            border-radius: 16px;
            padding: 12px 0;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.15s ease;
            color: #8395a7;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            font-weight: 600;
        }
        .bottom-menu button .label {
            font-size: 10px;
            color: #636e72;
            letter-spacing: 0.3px;
        }
        .bottom-menu button:active { transform: scale(0.93); background: rgba(255, 255, 255, 0.08); }
        .bottom-menu button.active {
            color: #ffd700;
            border-color: rgba(255, 215, 0, 0.1);
            background: rgba(255, 215, 0, 0.03);
        }

        /* --- Модальные окна --- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #16162e;
            border-radius: 28px;
            padding: 24px 20px;
            max-width: 400px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.7);
            animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal .head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .modal .head h2 { color: #ffd700; font-size: 20px; }
        .modal .head .close {
            background: none;
            border: none;
            color: #8395a7;
            font-size: 28px;
            cursor: pointer;
            padding: 0 8px;
        }
        .modal .balance {
            text-align: center;
            color: #8395a7;
            margin-bottom: 16px;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px;
            border-radius: 40px;
        }
        .modal .balance span { color: #ffd700; font-weight: 700; }

        /* --- Элементы списков в модалках --- */
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 10px 14px;
            margin-bottom: 8px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .item .info { text-align: left; }
        .item .info .name { color: #c8d6e5; font-weight: 600; font-size: 15px; }
        .item .info .desc { color: #8395a7; font-size: 12px; }
        .item .info .price { color: #ffd700; font-weight: 600; }
        .item .action-btn {
            background: linear-gradient(135deg, #ffd700, #f0a500);
            border: none;
            border-radius: 30px;
            padding: 6px 18px;
            font-weight: 700;
            font-size: 13px;
            color: #0a0a12;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .item .action-btn:active { transform: scale(0.92); }
        .item .action-btn.owned {
            background: #00b894;
            color: #fff;
            cursor: default;
        }
        .item .action-btn.disabled {
            background: #2d3436;
            color: #636e72;
            cursor: not-allowed;
        }

        /* --- Адаптив --- */
        @media (max-width: 400px) {
            .click-area { width: 150px; height: 150px; }
            .stat { font-size: 12px; padding: 4px 10px; }
            .stat .value { font-size: 14px; }
        }
        @media (min-width: 500px) {
            .click-area { width: 220px; height: 220px; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- ============ ВЕРХНЯЯ ПАНЕЛЬ ============ -->
        <div class="header">
            <div class="stat"><span class="icon">🏆</span> Lv.<span class="value" id="levelDisplay">1</span></div>
            <div class="stat"><span class="icon">💰</span> <span class="value" id="coinsDisplay">0</span></div>
            <div class="stat"><span class="icon">⚡</span> <span class="value" id="energyDisplay">100</span></div>
        </div>

        <!-- ============ ЭПОХА ============ -->
        <div class="era-display">
            <span class="era-name" id="eraName">🗡️ Сын крестьянина</span>
            <span class="era-sub" id="eraLevel">1–4</span>
        </div>

        <!-- ============ ПРОГРЕСС ============ -->
        <div class="progress-container">
            <span class="progress-label" id="progressLabel">0 XP</span>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <span class="progress-text" id="progressPercent">0%</span>
        </div>

        <!-- ============ КНОПКА ============ -->
        <div class="click-area" id="clickArea">
            <div class="badge" id="levelBadge">Lv.1</div>
            <div class="boost-badge" id="boostBadge"></div>
            <div class="energy-warning" id="energyWarning">⛔ НЕТ ЭНЕРГИИ</div>
        </div>

        <!-- ============ СТАТИСТИКА ============ -->
        <div class="stats-grid">
            <div class="item"><span class="num" id="totalClicks">0</span><span class="label">Кликов</span></div>
            <div class="item"><span class="num" id="clickPower">1</span><span class="label">За клик</span></div>
            <div class="item"><span class="num" id="stageDisplay">1</span><span class="label">Стадия</span></div>
        </div>

        <!-- ============ ЭНЕРГИЯ ============ -->
        <div class="energy-section">
            <div class="energy-header"><span>⚡ Энергия</span><span class="current"><span id="energyCurrent">100</span>/100</span></div>
            <div class="energy-bar"><div class="energy-fill" id="energyFill" style="width:100%"></div></div>
        </div>

        <!-- ============ НИЖНЕЕ МЕНЮ ============ -->
        <div class="bottom-menu">
            <button class="active" id="shopBtn">🛒<span class="label">Магазин</span></button>
            <button id="skillsBtn">⚡<span class="label">Навыки</span></button>
            <button id="infoBtn">📜<span class="label">Инфо</span></button>
            <button id="resetBtn">🔄<span class="label">Сброс</span></button>
        </div>
    </div>

    <!-- ============ МОДАЛКИ ============ -->
    <div class="modal-overlay" id="shopModal">
        <div class="modal">
            <div class="head"><h2>🛒 Магазин</h2><button class="close" id="closeShop">✕</button></div>
            <div class="balance">💰 <span id="shopBalance">0</span></div>
            <div id="shopList"></div>
        </div>
    </div>

    <div class="modal-overlay" id="skillsModal">
        <div class="modal">
            <div class="head"><h2>⚡ Навыки</h2><button class="close" id="closeSkills">✕</button></div>
            <div class="balance">💰 <span id="skillsBalance">0</span></div>
            <div id="skillsList"></div>
        </div>
    </div>

    <div class="modal-overlay" id="infoModal">
        <div class="modal">
            <div class="head"><h2>📜 Информация</h2><button class="close" id="closeInfo">✕</button></div>
            <div id="infoContent"></div>
        </div>
    </div>

    <script>
        // ============================================================
        //  НОВАЯ ТАКТИКА: 6 СТАДИЙ РАЗВИТИЯ (1–6)
        //  Ссылки на ваши изображения
        // ============================================================
        const STAGE_IMAGES = {
            1: 'https://i.ibb.co/3m6TCd2w/IMG-0719.png',
            2: 'https://i.ibb.co/WWxJHwvr/IMG-0731.png',
            3: 'https://i.ibb.co/xKQQQsQn/IMG-0723.png',
            4: 'https://i.ibb.co/M5pnQH6w/IMG-0727.png', // Ссылка добавлена вручную из вашего сообщения
            5: 'https://i.ibb.co/96K13rS/IMG-0727.png',
            6: 'https://i.ibb.co/PsNS6PyS/IMG-0730.png'
        };

        const STAGE_NAMES = {
            1: '🗡️ Сын крестьянина',
            2: '🛡️ Оруженосец',
            3: '⚔️ Младший рыцарь',
            4: '🏰 Рыцарь-лорд',
            5: '👑 Барон',
            6: '⚜️ Виконт'
        };

        // Какая стадия соответствует уровню
        function getStage(level) {
            if (level <= 4) return 1;
            if (level <= 9) return 2;
            if (level <= 14) return 3;
            if (level <= 19) return 4;
            if (level <= 24) return 5;
            return 6;
        }

        // Опыт для перехода на следующий уровень
        function getExpForLevel(level) {
            return Math.floor(100 + (level - 1) * 25);
        }

        // ============================================================
        //  СОСТОЯНИЕ ИГРЫ
        // ============================================================
        const state = {
            coins: 0,
            energy: 100,
            maxEnergy: 100,
            level: 1,
            exp: 0,
            totalClicks: 0,
            clickPower: 1,
            boostActive: false,
            boostTimer: null,
            // Купленные улучшения (навыки)
            skills: {
                clickBonus: 0,   // +1 к силе клика за уровень
                income: 0,       // пассивный доход в минуту
                energyRegen: 0,  // +1 к регенерации энергии
                luck: 0          // шанс на двойные монеты
            }
        };

        // ============================================================
        //  DOM ЭЛЕМЕНТЫ
        // ============================================================
        const clickArea = document.getElementById('clickArea');
        const levelDisplay = document.getElementById('levelDisplay');
        const coinsDisplay = document.getElementById('coinsDisplay');
        const energyDisplay = document.getElementById('energyDisplay');
        const energyCurrent = document.getElementById('energyCurrent');
        const energyFill = document.getElementById('energyFill');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const progressLabel = document.getElementById('progressLabel');
        const eraName = document.getElementById('eraName');
        const eraLevel = document.getElementById('eraLevel');
        const levelBadge = document.getElementById('levelBadge');
        const boostBadge = document.getElementById('boostBadge');
        const energyWarning = document.getElementById('energyWarning');
        const totalClicksEl = document.getElementById('totalClicks');
        const clickPowerEl = document.getElementById('clickPower');
        const stageDisplayEl = document.getElementById('stageDisplay');

        // ============================================================
        //  ФУНКЦИИ ОБНОВЛЕНИЯ UI
        // ============================================================
        function updateUI() {
            // Баланс и энергия
            coinsDisplay.textContent = Math.floor(state.coins);
            energyDisplay.textContent = Math.floor(state.energy);
            energyCurrent.textContent = Math.floor(state.energy);
            const energyPercent = Math.min(100, (state.energy / state.maxEnergy) * 100);
            energyFill.style.width = energyPercent + '%';

            // Уровень и прогресс
            levelDisplay.textContent = state.level;
            const expNeeded = getExpForLevel(state.level + 1);
            const expPercent = Math.min(100, (state.exp / expNeeded) * 100);
            progressFill.style.width = expPercent + '%';
            progressPercent.textContent = Math.floor(expPercent) + '%';
            progressLabel.textContent = `${state.exp} / ${expNeeded} XP`;

            // Стадия
            const stage = getStage(state.level);
            stageDisplayEl.textContent = stage;
            levelBadge.textContent = `Lv.${state.level}`;
            eraName.textContent = STAGE_NAMES[stage] || '🗡️ Сын крестьянина';
            const maxLvl = [4, 9, 14, 19, 24, Infinity];
            const minLvl = [1, 5, 10, 15, 20, 25];
            eraLevel.textContent = `${minLvl[stage-1]}–${maxLvl[stage-1] === Infinity ? '∞' : maxLvl[stage-1]}`;

            // Кнопка (изображение)
            const imgUrl = STAGE_IMAGES[stage];
            if (imgUrl) {
                clickArea.style.backgroundImage = `url('${imgUrl}')`;
                clickArea.style.backgroundSize = 'cover';
                clickArea.style.backgroundPosition = 'center';
            } else {
                clickArea.style.backgroundImage = 'radial-gradient(circle at 30% 30%, #2a2a5e, #0f0f1f)';
            }

            // Статистика
            totalClicksEl.textContent = state.totalClicks;
            clickPowerEl.textContent = state.clickPower.toFixed(1);

            // Буст
            if (state.boostActive) {
                boostBadge.textContent = '🔥 x2';
                boostBadge.classList.add('show');
            } else {
                boostBadge.classList.remove('show');
            }

            // Предупреждение об энергии
            if (state.energy <= 0) {
                energyWarning.classList.add('show');
            } else {
                energyWarning.classList.remove('show');
            }
        }

        // ============================================================
        //  ОСНОВНАЯ МЕХАНИКА КЛИКА
        // ============================================================
        function handleClick() {
            if (state.energy <= 0) {
                energyWarning.classList.add('show');
                setTimeout(() => {
                    if (state.energy > 0) energyWarning.classList.remove('show');
                }, 1500);
                return;
            }

            // Базовый доход
            let earned = state.clickPower;
            // Бонус от удачи
            if (Math.random() * 100 < state.skills.luck) {
                earned *= 2;
                // Можно добавить визуальный эффект
            }
            // Буст (x2)
            if (state.boostActive) earned *= 2;

            state.coins += earned;
            state.energy -= 1;
            state.totalClicks += 1;
            state.exp += 1;

            // Проверка повышения уровня
            const expNeeded = getExpForLevel(state.level + 1);
            if (state.exp >= expNeeded) {
                state.exp -= expNeeded;
                state.level += 1;
                // Бонус за новый уровень
                state.clickPower += 0.2;
                // Визуальное оповещение
                if (getStage(state.level) !== getStage(state.level - 1)) {
                    // Новая стадия!
                    const newStage = getStage(state.level);
                    const name = STAGE_NAMES[newStage] || 'Новая стадия';
                    alert(`🎉 НОВАЯ СТАДИЯ! Вы достигли ${name}!`);
                } else {
                    // Просто новый уровень
                    const msg = `🎉 Уровень ${state.level}!`;
                    // Используем toast (можно добавить позже)
                }
            }

            // Анимация нажатия
            clickArea.style.transform = 'scale(0.93)';
            setTimeout(() => { clickArea.style.transform = ''; }, 100);

            updateUI();
        }

        // ============================================================
        //  МАГАЗИН (УЛУЧШЕНИЯ)
        // ============================================================
        const shopItems = [
            { id: 'click1', name: '🗡️ Улучшение клика', price: 50, desc: '+0.5 к силе клика', action: () => { state.clickPower += 0.5; } },
            { id: 'click2', name: '⚡ Усиление клика', price: 150, desc: '+1 к силе клика', action: () => { state.clickPower += 1; } },
            { id: 'energy1', name: '💎 Энергетик', price: 100, desc: '+25 к макс. энергии', action: () => { state.maxEnergy += 25; state.energy += 25; } },
            { id: 'luck1', name: '🍀 Удача', price: 200, desc: '+5% шанс x2 монет', action: () => { state.skills.luck += 5; } },
            { id: 'income1', name: '💰 Пассивный доход', price: 300, desc: '+5 монет/мин', action: () => { state.skills.income += 5; } }
        ];

        function renderShop() {
            const list = document.getElementById('shopList');
            list.innerHTML = '';
            shopItems.forEach(item => {
                const owned = state.skills[item.id] || false;
                const canBuy = state.coins >= item.price && !owned;
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="info">
                        <div class="name">${item.name}</div>
                        <div class="desc">${item.desc}</div>
                        <div class="price">💰 ${item.price}</div>
                    </div>
                    <button class="action-btn ${owned ? 'owned' : (!canBuy ? 'disabled' : '')}" ${!canBuy ? 'disabled' : ''}>
                        ${owned ? '✅ Куплено' : 'Купить'}
                    </button>
                `;
                const btn = div.querySelector('.action-btn');
                if (!owned && canBuy) {
                    btn.addEventListener('click', () => {
                        state.coins -= item.price;
                        state.skills[item.id] = true;
                        item.action();
                        renderShop();
                        updateUI();
                    });
                }
                list.appendChild(div);
            });
            document.getElementById('shopBalance').textContent = Math.floor(state.coins);
        }

        // ============================================================
        //  НАВЫКИ (ПРОКАЧКА)
        // ============================================================
        function renderSkills() {
            const list = document.getElementById('skillsList');
            list.innerHTML = '';
            // Навык "Сила клика"
            const clickCost = 30 + state.skills.clickBonus * 20;
            const clickLevel = state.skills.clickBonus;
            const clickDiv = document.createElement('div');
            clickDiv.className = 'item';
            clickDiv.innerHTML = `
                <div class="info">
                    <div class="name">🗡️ Сила клика (ур.${clickLevel})</div>
                    <div class="desc">+1 к силе клика за уровень</div>
                    <div class="price">💰 ${clickCost}</div>
                </div>
                <button class="action-btn ${state.coins < clickCost ? 'disabled' : ''}" ${state.coins < clickCost ? 'disabled' : ''}>
                    Купить
                </button>
            `;
            const btn = clickDiv.querySelector('.action-btn');
            btn.addEventListener('click', () => {
                if (state.coins >= clickCost) {
                    state.coins -= clickCost;
                    state.skills.clickBonus += 1;
                    state.clickPower += 1;
                    renderSkills();
                    updateUI();
                }
            });
            list.appendChild(clickDiv);

            // Навык "Регенерация энергии"
            const regenCost = 50 + state.skills.energyRegen * 30;
            const regenLevel = state.skills.energyRegen;
            const regenDiv = document.createElement('div');
            regenDiv.className = 'item';
            regenDiv.innerHTML = `
                <div class="info">
                    <div class="name">⚡ Регенерация (ур.${regenLevel})</div>
                    <div class="desc">+1 к регенерации энергии в минуту</div>
                    <div class="price">💰 ${regenCost}</div>
                </div>
                <button class="action-btn ${state.coins < regenCost ? 'disabled' : ''}" ${state.coins < regenCost ? 'disabled' : ''}>
                    Купить
                </button>
            `;
            const regenBtn = regenDiv.querySelector('.action-btn');
            regenBtn.addEventListener('click', () => {
                if (state.coins >= regenCost) {
                    state.coins -= regenCost;
                    state.skills.energyRegen += 1;
                    renderSkills();
                    updateUI();
                }
            });
            list.appendChild(regenDiv);

            document.getElementById('skillsBalance').textContent = Math.floor(state.coins);
        }

        // ============================================================
        //  ИНФОРМАЦИЯ
        // ============================================================
        function renderInfo() {
            const content = document.getElementById('infoContent');
            const stage = getStage(state.level);
            const name = STAGE_NAMES[stage] || 'Неизвестно';
            content.innerHTML = `
                <p style="color:#c8d6e5;font-size:16px;margin-bottom:8px;">📖 <strong>Твой путь:</strong></p>
                <p style="color:#ffd700;font-size:18px;margin-bottom:12px;">${name}</p>
                <p style="color:#8395a7;font-size:14px;">Уровень: <strong style="color:#ffd700;">${state.level}</strong></p>
                <p style="color:#8395a7;font-size:14px;">Стадия: <strong style="color:#ffd700;">${stage} из 6</strong></p>
                <p style="color:#8395a7;font-size:14px;">Кликов: <strong style="color:#ffd700;">${state.totalClicks}</strong></p>
                <p style="color:#8395a7;font-size:14px;">Сила клика: <strong style="color:#ffd700;">${state.clickPower.toFixed(1)}</strong></p>
                <p style="color:#8395a7;font-size:14px;">Энергия: <strong style="color:#ffd700;">${Math.floor(state.energy)}/${state.maxEnergy}</strong></p>
                <hr style="border-color:rgba(255,255,255,0.05);margin:12px 0;">
                <p style="color:#636e72;font-size:12px;">🎯 Следующая стадия: ${stage < 6 ? STAGE_NAMES[stage+1] : 'Максимум!'}</p>
            `;
        }

        // ============================================================
        //  АВТОМАТИЧЕСКИЕ ПРОЦЕССЫ
        // ============================================================
        // Регенерация энергии (каждую секунду)
        setInterval(() => {
            if (state.energy < state.maxEnergy) {
                const regenAmount = 1 + state.skills.energyRegen / 60;
                state.energy = Math.min(state.maxEnergy, state.energy + regenAmount);
                updateUI();
            }
        }, 1000);

        // Пассивный доход (каждую минуту)
        setInterval(() => {
            if (state.skills.income > 0) {
                state.coins += state.skills.income;
                updateUI();
            }
        }, 60000);

        // ============================================================
        //  СОБЫТИЯ КНОПОК
        // ============================================================
        clickArea.addEventListener('click', handleClick);

        document.getElementById('shopBtn').addEventListener('click', () => {
            renderShop();
            document.getElementById('shopModal').classList.add('active');
        });
        document.getElementById('closeShop').addEventListener('click', () => {
            document.getElementById('shopModal').classList.remove('active');
        });

        document.getElementById('skillsBtn').addEventListener('click', () => {
            renderSkills();
            document.getElementById('skillsModal').classList.add('active');
        });
        document.getElementById('closeSkills').addEventListener('click', () => {
            document.getElementById('skillsModal').classList.remove('active');
        });

        document.getElementById('infoBtn').addEventListener('click', () => {
            renderInfo();
            document.getElementById('infoModal').classList.add('active');
        });
        document.getElementById('closeInfo').addEventListener('click', () => {
            document.getElementById('infoModal').classList.remove('active');
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            if (confirm('⚠️ Вы уверены? Весь прогресс будет сброшен!')) {
                localStorage.removeItem('eraGameState');
                location.reload();
            }
        });

        // Закрытие модалок по клику на фон
        document.querySelectorAll('.modal-overlay').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target === el) el.classList.remove('active');
            });
        });

        // ============================================================
        //  СОХРАНЕНИЕ И ЗАГРУЗКА
        // ============================================================
        function saveGame() {
            const data = { ...state };
            localStorage.setItem('eraGameState', JSON.stringify(data));
        }

        function loadGame() {
            const saved = localStorage.getItem('eraGameState');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    Object.assign(state, data);
                } catch (e) {
                    console.warn('Ошибка загрузки сохранения');
                }
            }
        }

        // Автосохранение каждые 15 секунд
        setInterval(saveGame, 15000);

        // ============================================================
        //  ЗАПУСК
        // ============================================================
        loadGame();
        updateUI();

        // Бонус: буст на 10 секунд при старте
        setTimeout(() => {
            state.boostActive = true;
            updateUI();
            setTimeout(() => {
                state.boostActive = false;
                updateUI();
            }, 10000);
        }, 500);

        console.log('✅ Игра загружена! Новая тактика с 6 стадиями.');
        console.log('📊 Текущая стадия:', getStage(state.level), STAGE_NAMES[getStage(state.level)]);
    </script>
</body>
</html>
