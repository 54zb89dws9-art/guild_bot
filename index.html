<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold Epoch</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <style>
        /* ============ БАЗА ============ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a12;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            background-image: radial-gradient(ellipse at top, #1a1a2e 0%, #0a0a12 70%);
            user-select: none;
            overflow: hidden;
        }
        .game-container {
            max-width: 420px;
            width: 100%;
            position: relative;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 20px 16px 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.5s;
        }

        /* ============ ШАПКА ============ */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 12px 18px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .header-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 600;
            color: #c8d6e5;
        }
        .header-item .icon {
            font-size: 20px;
        }
        .header-item .value {
            color: #ffd700;
            font-size: 18px;
        }

        /* ============ КЛИК-ЗОНА ============ */
        .click-area {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #2a2a5e, #0f0f1f);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 3px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.1), inset 0 -10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            user-select: none;
        }
        .click-area::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #ffd700, #ff6b6b, #ffd700);
            opacity: 0.3;
            z-index: -1;
            animation: rotateBorder 6s linear infinite;
        }
        @keyframes rotateBorder {
            to {
                transform: rotate(360deg);
            }
        }
        .click-area:active {
            transform: scale(0.92);
            border-color: #ffd700;
            box-shadow: 0 0 100px rgba(255, 215, 0, 0.3), inset 0 -5px 20px rgba(0, 0, 0, 0.3);
        }
        .click-area .emoji {
            font-size: 70px;
            line-height: 1;
            filter: drop-shadow(0 4px 20px rgba(255, 215, 0, 0.3));
            transition: transform 0.1s;
        }
        .click-area:active .emoji {
            transform: scale(1.1);
        }
        .click-area .text {
            font-size: 14px;
            font-weight: 700;
            margin-top: 8px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .click-area .level-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 700;
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        /* ============ ЭФФЕКТЫ ============ */
        .click-effect {
            position: fixed;
            pointer-events: none;
            z-index: 999;
            font-size: 40px;
            animation: clickBurst 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes clickBurst {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(1.5);
            }
        }
        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 998;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ffd700;
            animation: sparkleFly 0.6s ease forwards;
        }
        @keyframes sparkleFly {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--sx), var(--sy)) scale(0);
            }
        }

        /* ============ СТАТИСТИКА ============ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 16px 0;
        }
        .stat-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 12px 8px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(5px);
        }
        .stat-card .stat-value {
            font-size: 22px;
            font-weight: 800;
            color: #ffd700;
            display: block;
        }
        .stat-card .stat-label {
            font-size: 11px;
            color: #8395a7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
            display: block;
        }

        /* ============ ЭНЕРГИЯ ============ */
        .energy-section {
            margin: 12px 0 16px;
        }
        .energy-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #8395a7;
            margin-bottom: 6px;
            padding: 0 4px;
        }
        .energy-header .current {
            color: #ffd700;
            font-weight: 600;
        }
        .energy-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }
        .energy-fill {
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5, #00d2ff);
            background-size: 200% 100%;
            animation: shimmer 3s ease-in-out infinite;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }
        @keyframes shimmer {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }
        .energy-bar .energy-text {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 9px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.5);
        }

        /* ============ КНОПКИ ============ */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 4px 0 8px;
        }
        .btn {
            padding: 14px;
            border: none;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-primary {
            background: linear-gradient(135deg, #ffd700, #f0a500);
            color: #0a0a12;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.25);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #c8d6e5;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .btn-word {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.3);
        }
        .btn-block {
            grid-column: 1 / -1;
        }

        /* ============ МАГАЗИН ============ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }
        .modal-overlay.active {
            display: flex;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: #1a1a2e;
            border-radius: 30px;
            padding: 24px 20px;
            max-width: 400px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
            animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal h2 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .modal .close-btn {
            float: right;
            background: none;
            border: none;
            color: #8395a7;
            font-size: 28px;
            cursor: pointer;
            transition: 0.3s;
        }
        .modal .close-btn:hover {
            color: #ff6b6b;
            transform: rotate(90deg);
        }

        .skin-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: 0.3s;
        }
        .skin-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        .skin-item .info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .skin-item .name {
            font-size: 16px;
            font-weight: 600;
            color: #c8d6e5;
        }
        .skin-item .price {
            font-size: 13px;
            color: #ffd700;
        }
        .skin-item .bonus {
            font-size: 12px;
            color: #00b894;
        }
        .skin-item .owned {
            color: #00b894;
            font-size: 13px;
            font-weight: 600;
        }
        .skin-item .buy-btn {
            background: linear-gradient(135deg, #ffd700, #f0a500);
            border: none;
            padding: 8px 18px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            color: #0a0a12;
            transition: 0.3s;
        }
        .skin-item .buy-btn:active {
            transform: scale(0.95);
        }
        .skin-item .buy-btn.owned-btn {
            background: #00b894;
            color: white;
            cursor: pointer;
        }
        .skin-item .buy-btn.owned-btn.active-skin {
            background: #ffd700;
            color: #0a0a12;
        }
        .skin-item .buy-btn.disabled {
            background: #2d3436;
            color: #636e72;
            cursor: not-allowed;
        }
        .modal .balance-info {
            text-align: center;
            color: #8395a7;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .modal .balance-info span {
            color: #ffd700;
            font-weight: 700;
        }

        /* ============ УГАДАЙ СЛОВО ============ */
        .word-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            z-index: 2500;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.4s ease;
        }
        .word-overlay.active {
            display: flex;
        }
        .word-box {
            background: linear-gradient(145deg, #1a1a3e, #0f0f2a);
            border-radius: 30px;
            padding: 30px 24px;
            max-width: 400px;
            width: 100%;
            border: 2px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .word-box .word-title {
            color: #ffd700;
            font-size: 22px;
            text-align: center;
            margin-bottom: 8px;
        }
        .word-box .word-hint {
            color: #8395a7;
            font-size: 14px;
            text-align: center;
            margin-bottom: 16px;
        }
        .word-box .word-display {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 12px;
            color: #c8d6e5;
            background: rgba(0, 0, 0, 0.3);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 16px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            font-family: 'Courier New', monospace;
        }
        .word-box .word-input {
            width: 100%;
            padding: 14px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.3);
            color: #c8d6e5;
            font-size: 18px;
            text-align: center;
            outline: none;
            transition: 0.3s;
            font-family: 'Courier New', monospace;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .word-box .word-input:focus {
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.1);
        }
        .word-box .word-attempts {
            text-align: center;
            color: #8395a7;
            font-size: 14px;
            margin: 12px 0;
        }
        .word-box .word-attempts span {
            color: #ffd700;
            font-weight: 700;
        }
        .word-box .word-result {
            text-align: center;
            margin: 12px 0;
            font-size: 18px;
            font-weight: 700;
            min-height: 40px;
        }
        .word-box .word-result .reward {
            color: #ffd700;
        }
        .word-box .word-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }
        .word-box .word-buttons button {
            padding: 14px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .word-box .word-buttons button:active {
            transform: scale(0.95);
        }
        .word-box .word-buttons .guess-btn {
            background: linear-gradient(135deg, #ffd700, #f0a500);
            color: #0a0a12;
        }
        .word-box .word-buttons .close-btn {
            background: rgba(255, 255, 255, 0.06);
            color: #c8d6e5;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .word-box .word-status {
            text-align: center;
            color: #8395a7;
            font-size: 13px;
            margin-top: 10px;
        }

        /* ============ ТОСТЫ ============ */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            pointer-events: none;
        }
        .toast {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            margin-top: 8px;
            animation: slideDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
            min-width: 200px;
            max-width: 90%;
        }
        .toast.success {
            border-color: rgba(0, 184, 148, 0.4);
        }
        .toast.error {
            border-color: rgba(255, 107, 107, 0.4);
        }
        .toast.level-up {
            border-color: rgba(255, 215, 0, 0.6);
            background: rgba(255, 215, 0, 0.15);
            font-size: 20px;
        }
        .toast.word-toast {
            border-color: rgba(108, 92, 231, 0.5);
            background: rgba(108, 92, 231, 0.15);
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0) scale(1);
            }
        }
        .toast.fade-out {
            animation: fadeOut 0.3s ease forwards;
        }
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px) scale(0.95);
            }
        }

        /* ============ ПАРТИКЛЫ ============ */
        .coin-particle {
            position: fixed;
            font-size: 30px;
            pointer-events: none;
            z-index: 999;
            animation: coinFly 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes coinFly {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(1.5);
            }
        }

        /* ============ СКИНЫ ============ */
        .skin-gold .click-area {
            border-color: #ffd700;
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.2), inset 0 -10px 30px rgba(0, 0, 0, 0.5);
        }
        .skin-gold .click-area .emoji {
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.6));
        }
        .skin-fire .click-area {
            border-color: #ff6b6b;
            box-shadow: 0 0 80px rgba(255, 107, 107, 0.2), inset 0 -10px 30px rgba(0, 0, 0, 0.5);
            background: radial-gradient(circle at 30% 30%, #3a1a1a, #1f0f0f);
        }
        .skin-fire .click-area .emoji {
            filter: drop-shadow(0 0 30px rgba(255, 107, 107, 0.6));
        }
        .skin-cosmic .click-area {
            border-color: #a29bfe;
            box-shadow: 0 0 80px rgba(162, 155, 254, 0.2), inset 0 -10px 30px rgba(0, 0, 0, 0.5);
            background: radial-gradient(circle at 30% 30%, #1a1a3a, #0f0f1f);
        }
        .skin-cosmic .click-area .emoji {
            filter: drop-shadow(0 0 30px rgba(162, 155, 254, 0.6));
        }
        .skin-legend .click-area {
            border-color: #fd79a8;
            box-shadow: 0 0 100px rgba(253, 121, 168, 0.3), inset 0 -10px 30px rgba(0, 0, 0, 0.5);
            background: radial-gradient(circle at 30% 30%, #2a1a2a, #1a0f1a);
        }
        .skin-legend .click-area::before {
            background: conic-gradient(from 0deg, #fd79a8, #ffd700, #fd79a8);
            opacity: 0.5;
        }
        .skin-legend .click-area .emoji {
            filter: drop-shadow(0 0 40px rgba(253, 121, 168, 0.7));
        }

        /* ============ АДАПТИВ ============ */
        @media (max-width: 400px) {
            .click-area {
                width: 160px;
                height: 160px;
            }
            .click-area .emoji {
                font-size: 50px;
            }
            .stat-card .stat-value {
                font-size: 18px;
            }
            .btn {
                font-size: 12px;
                padding: 12px;
            }
            .word-box .word-display {
                font-size: 24px;
                letter-spacing: 8px;
            }
        }
        @media (min-width: 500px) {
            .click-area {
                width: 240px;
                height: 240px;
            }
            .click-area .emoji {
                font-size: 80px;
            }
        }
    </style>
</head>
<body>
    <!-- ============ ОСНОВНОЙ ЭКРАН ============ -->
    <div class="game-container" id="app">
        <div class="header">
            <div class="header-item"><span class="icon">🏆</span><span>Lv.<span class="value" id="level">1</span></span></div>
            <div class="header-item"><span class="icon">💰</span><span class="value" id="coins">150</span></div>
            <div class="header-item"><span class="icon">⚡</span><span class="value" id="energyDisplay">100</span></div>
        </div>

        <div class="click-area" id="clickArea">
            <span class="level-badge" id="levelBadge">Lv.1</span>
            <span class="emoji" id="clickEmoji">⚔️</span>
            <span class="text">ТАПАЙ!</span>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><span class="stat-value" id="clickCount">0</span><span class="stat-label">Всего кликов</span></div>
            <div class="stat-card"><span class="stat-value" id="earnedToday">0</span><span class="stat-label">За сегодня</span></div>
            <div class="stat-card"><span class="stat-value" id="expDisplay">0/100</span><span class="stat-label">Опыт</span></div>
        </div>

        <div class="energy-section">
            <div class="energy-header"><span>⚡ Энергия</span><span class="current"><span id="energyCurrent">100</span> / 100</span></div>
            <div class="energy-bar"><div class="energy-fill" id="energyFill" style="width: 100%"></div><span class="energy-text" id="energyPercent">100%</span></div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-primary" id="boostBtn">⚡ +50%</button>
            <button class="btn btn-secondary" id="shopBtn">🛒 Магазин</button>
            <button class="btn btn-word btn-block" id="wordBtn">🔤 Угадай слово</button>
            <button class="btn btn-secondary btn-block" id="statsBtn">📊 Статистика</button>
        </div>
    </div>

    <!-- ============ МАГАЗИН ============ -->
    <div class="modal-overlay" id="shopModal">
        <div class="modal">
            <button class="close-btn" id="closeShop">✕</button>
            <h2>🛒 Магазин скинов</h2>
            <div class="balance-info">💰 Твой баланс: <span id="shopBalance">150</span> монет</div>
            <div id="skinList"></div>
        </div>
    </div>

    <!-- ============ УГАДАЙ СЛОВО ============ -->
    <div class="word-overlay" id="wordOverlay">
        <div class="word-box">
            <div class="word-title">🔤 Угадай слово</div>
            <div class="word-hint" id="wordHint">Подсказка: загружается...</div>
            <div class="word-display" id="wordDisplay">_ _ _ _ _</div>
            <input class="word-input" id="wordInput" maxlength="1" placeholder="Введите букву" autofocus>
            <div class="word-attempts">Попыток: <span id="wordAttempts">3</span></div>
            <div class="word-result" id="wordResult"></div>
            <div class="word-buttons">
                <button class="guess-btn" id="wordGuessBtn">🔍 Угадать</button>
                <button class="close-btn" id="wordCloseBtn">✕ Закрыть</button>
            </div>
            <div class="word-status" id="wordStatus">Новое слово каждый день!</div>
        </div>
    </div>

    <!-- ============ ТОСТЫ ============ -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // ============= СЛОВА ДЛЯ КАЖДОГО ДНЯ =============
        function getDailyWord() {
            const words = [
                { word: 'ЗАМОК', hint: '🏰 Средневековое сооружение для защиты' },
                { word: 'РЫЦАРЬ', hint: '⚔️ Воин в доспехах на коне' },
                { word: 'КОРОНА', hint: '👑 Символ власти монарха' },
                { word: 'МЕЧ', hint: '⚔️ Главное оружие рыцаря' },
                { word: 'ЩИТ', hint: '🛡️ Защита в бою' },
                { word: 'ТРОН', hint: '👑 Место короля' },
                { word: 'ДРАКОН', hint: '🐉 Огнедышащее существо' },
                { word: 'ГИЛЬДИЯ', hint: '🏛️ Объединение ремесленников или воинов' },
                { word: 'ПАРЧА', hint: '✨ Дорогая ткань с золотом' },
                { word: 'КРЕСТ', hint: '✝️ Символ веры' },
                { word: 'ВЕНОК', hint: '🌿 Головной убор из цветов' },
                { word: 'САПОГИ', hint: '👢 Обувь рыцаря' },
                { word: 'ПЛАЩ', hint: '🧥 Накидка с капюшоном' },
                { word: 'КОЛЧАН', hint: '🏹 Чехол для стрел' },
                { word: 'ШПАГА', hint: '🗡️ Тонкий меч для фехтования' },
                { word: 'АРБАЛЕТ', hint: '🏹 Средневековый лук с механизмом' },
                { word: 'БАРБАКАН', hint: '🏰 Оборонительное сооружение у входа' },
                { word: 'ПАЖ', hint: '👦 Молодой слуга при рыцаре' },
                { word: 'ГЕРБ', hint: '🛡️ Символ рода или государства' },
                { word: 'МАНТИЯ', hint: '👑 Длинная накидка правителя' }
            ];

            // Используем день года для выбора слова
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            const diff = now - start;
            const dayOfYear = Math.floor(diff / (1000 * 60 * 60 * 24));
            const index = dayOfYear % words.length;
            return words[index];
        }

        // ============= ДАННЫЕ СКИНОВ =============
        const SKINS = [
            { id: 'default', name: '⚔️ Обычный', price: 0, bonus: 1, emoji: '⚔️' },
            { id: 'gold', name: '👑 Золотой', price: 3000, bonus: 1.2, emoji: '👑', desc: '+20% к заработку' },
            { id: 'fire', name: '🔥 Огненный', price: 8000, bonus: 1.5, emoji: '🔥', desc: '+50% к заработку' },
            { id: 'cosmic', name: '🌌 Космический', price: 15000, bonus: 2.0, emoji: '🌌', desc: '+100% к заработку' },
            { id: 'legend', name: '💎 Легендарный', price: 30000, bonus: 3.0, emoji: '💎', desc: '+200% к заработку' }
        ];

        // ============= СОСТОЯНИЕ =============
        const state = {
            coins: 150,
            energy: 100,
            maxEnergy: 100,
            level: 1,
            exp: 0,
            expToNext: 100,
            clicks: 0,
            earnedToday: 0,
            skin: 'default',
            ownedSkins: ['default'],
            lastClickTime: 0,
            comboCount: 0,
            wordAttempts: 3,
            wordGuessed: false,
            wordCooldown: 0
        };

        // ============= DOM =============
        const $ = id => document.getElementById(id);
        const coinsEl = $('coins');
        const energyDisplay = $('energyDisplay');
        const energyFill = $('energyFill');
        const energyCurrent = $('energyCurrent');
        const energyPercent = $('energyPercent');
        const levelEl = $('level');
        const levelBadge = $('levelBadge');
        const clickCount = $('clickCount');
        const earnedToday = $('earnedToday');
        const expDisplay = $('expDisplay');
        const clickArea = $('clickArea');
        const clickEmoji = $('clickEmoji');
        const container = $('app');
        const shopModal = $('shopModal');
        const shopBalance = $('shopBalance');
        const skinList = $('skinList');
        const closeShop = $('closeShop');
        const wordOverlay = $('wordOverlay');
        const wordHint = $('wordHint');
        const wordDisplay = $('wordDisplay');
        const wordInput = $('wordInput');
        const wordAttempts = $('wordAttempts');
        const wordResult = $('wordResult');
        const wordStatus = $('wordStatus');
        const wordGuessBtn = $('wordGuessBtn');
        const wordCloseBtn = $('wordCloseBtn');

        let currentWord = '';
        let currentHint = '';
        let guessedLetters = [];
        let attemptsLeft = 3;
        let gameOver = false;

        // ============= ТОСТЫ =============
        function showToast(text, type = 'success', duration = 2000) {
            const container = $('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = text;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        // ============= ЭФФЕКТЫ =============
        function spawnClickEffect(x, y, emoji = '✨') {
            const el = document.createElement('div');
            el.className = 'click-effect';
            el.textContent = emoji;
            el.style.left = (x - 20) + 'px';
            el.style.top = (y - 20) + 'px';
            el.style.setProperty('--tx', (Math.random() - 0.5) * 120 + 'px');
            el.style.setProperty('--ty', -Math.random() * 120 - 40 + 'px');
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function spawnSparkles(x, y, count = 6) {
            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'sparkle';
                el.style.left = (x + (Math.random() - 0.5) * 40) + 'px';
                el.style.top = (y + (Math.random() - 0.5) * 40) + 'px';
                el.style.setProperty('--sx', (Math.random() - 0.5) * 80 + 'px');
                el.style.setProperty('--sy', (Math.random() - 0.5) * 80 + 'px');
                el.style.background = ['#ffd700', '#ff6b6b', '#a29bfe', '#fd79a8', '#00b894'][Math.floor(Math.random() *
                5)];
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 600);
            }
        }

        function spawnCoins(x, y, count = 3) {
            const emojis = ['🪙', '⭐', '💎'];
            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'coin-particle';
                el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                el.style.left = (x + (Math.random() - 0.5) * 60) + 'px';
                el.style.top = (y + (Math.random() - 0.5) * 60) + 'px';
                el.style.setProperty('--tx', (Math.random() - 0.5) * 150 + 'px');
                el.style.setProperty('--ty', -Math.random() * 200 - 50 + 'px');
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 1200);
            }
        }

        // ============= БОНУС ОТ СКИНА =============
        function getSkinBonus() {
            const skin = SKINS.find(s => s.id === state.skin);
            return skin ? skin.bonus : 1;
        }

        // ============= УГАДАЙ СЛОВО =============
        function initWordGame() {
            const now = Date.now();
            if (now - state.wordCooldown < 86400000) {
                const left = Math.ceil((86400000 - (now - state.wordCooldown)) / 3600000);
                showToast(`⏳ Новое слово через ${left} час(ов)`, 'error');
                return;
            }

            // Проверяем, отгадано ли сегодня
            const today = new Date().toDateString();
            if (localStorage.getItem('word_guessed_' + today) === 'true') {
                showToast('✅ Ты уже отгадал слово сегодня! Возвращайся завтра', 'error');
                return;
            }

            const daily = getDailyWord();
            currentWord = daily.word;
            currentHint = daily.hint;
            guessedLetters = [];
            attemptsLeft = 3;
            gameOver = false;

            wordHint.textContent = '💡 ' + currentHint;
            wordAttempts.textContent = attemptsLeft;
            wordResult.textContent = '';
            wordInput.value = '';
            wordInput.disabled = false;
            wordGuessBtn.disabled = false;
            wordStatus.textContent = '🔍 У тебя 3 попытки!';
            wordOverlay.classList.add('active');
            updateWordDisplay();
            setTimeout(() => wordInput.focus(), 300);
        }

        function updateWordDisplay() {
            let display = '';
            for (let char of currentWord) {
                if (guessedLetters.includes(char)) {
                    display += char + ' ';
                } else {
                    display += '_ ';
                }
            }
            wordDisplay.textContent = display.trim();
        }

        function guessWord() {
            if (gameOver) return;

            const input = wordInput.value.toUpperCase().trim();
            if (!input) {
                showToast('Введите букву!', 'error');
                return;
            }

            if (input.length > 1) {
                // Проверка целого слова
                if (input === currentWord) {
                    winGame();
                    return;
                } else {
                    attemptsLeft--;
                    wordAttempts.textContent = attemptsLeft;
                    showToast(`❌ Неправильно! Осталось ${attemptsLeft} попыток`, 'error');
                    if (attemptsLeft <= 0) {
                        loseGame();
                    }
                    return;
                }
            }

            const letter = input[0];
            if (guessedLetters.includes(letter)) {
                showToast('Эта буква уже открыта!', 'error');
                return;
            }

            if (currentWord.includes(letter)) {
                guessedLetters.push(letter);
                updateWordDisplay();
                showToast(`✅ Буква "${letter}" есть в слове!`, 'success');
                spawnSparkles(window.innerWidth / 2, window.innerHeight / 2, 8);

                // Проверка победы
                let allGuessed = true;
                for (let char of currentWord) {
                    if (!guessedLetters.includes(char)) {
                        allGuessed = false;
                        break;
                    }
                }
                if (allGuessed) {
                    winGame();
                }
            } else {
                attemptsLeft--;
                wordAttempts.textContent = attemptsLeft;
                showToast(`❌ Буквы "${letter}" нет в слове!`, 'error');
                if (attemptsLeft <= 0) {
                    loseGame();
                }
            }

            wordInput.value = '';
            setTimeout(() => wordInput.focus(), 100);
        }

        function winGame() {
            gameOver = true;
            wordInput.disabled = true;
            wordGuessBtn.disabled = true;

            const reward = 1000;
            state.coins += reward;
            state.wordCooldown = Date.now();
            const today = new Date().toDateString();
            localStorage.setItem('word_guessed_' + today, 'true');

            wordResult.innerHTML = `🎉 <span class="reward">ПОБЕДА!</span> Ты отгадал слово "${currentWord}"!<br>💰 +${reward} монет!`;
            wordStatus.textContent = '🏆 Отлично! Завтра новое слово!';
            updateUI();

            spawnCoins(window.innerWidth / 2, window.innerHeight / 2, 20);
            spawnSparkles(window.innerWidth / 2, window.innerHeight / 2, 30);
            showToast(`💰 +${reward} монет за угаданное слово!`, 'word-toast', 3000);
        }

        function loseGame() {
            gameOver = true;
            wordInput.disabled = true;
            wordGuessBtn.disabled = true;
            wordResult.innerHTML = `😢 Не повезло! Загаданное слово: <strong>${currentWord}</strong>`;
            wordStatus.textContent = '🔄 Попробуй завтра!';
        }

        function closeWordGame() {
            wordOverlay.classList.remove('active');
        }

        // ============= ОБНОВЛЕНИЕ UI =============
        function updateUI() {
            coinsEl.textContent = state.coins;
            energyDisplay.textContent = Math.floor(state.energy);
            energyCurrent.textContent = Math.floor(state.energy);
            const percent = (state.energy / state.maxEnergy) * 100;
            energyFill.style.width = Math.min(100, percent) + '%';
            energyPercent.textContent = Math.floor(percent) + '%';
            levelEl.textContent = state.level;
            levelBadge.textContent = `Lv.${state.level}`;
            clickCount.textContent = state.clicks;
            earnedToday.textContent = state.earnedToday;
            expDisplay.textContent = `${state.exp}/${state.expToNext}`;

            container.className = `game-container skin-${state.skin}`;
            const skin = SKINS.find(s => s.id === state.skin);
            clickEmoji.textContent = skin ? skin.emoji : '⚔️';
            shopBalance.textContent = state.coins;
        }

        // ============= МАГАЗИН =============
        function openShop() {
            renderSkins();
            shopBalance.textContent = state.coins;
            shopModal.classList.add('active');
        }

        function closeShopModal() {
            shopModal.classList.remove('active');
        }

        function renderSkins() {
            skinList.innerHTML = '';
            SKINS.forEach(skin => {
                const owned = state.ownedSkins.includes(skin.id);
                const isActive = state.skin === skin.id;
                const canBuy = state.coins >= skin.price && !owned && skin.price > 0;
                const isDefault = skin.id === 'default';

                const div = document.createElement('div');
                div.className = 'skin-item';

                let statusText = '';
                let bonusText = '';
                if (skin.bonus > 0) {
                    bonusText = `🔥 +${Math.round((skin.bonus - 1) * 100)}% к монетам`;
                }

                if (isDefault) statusText = '🆓 Бесплатно';
                else if (owned && isActive) statusText = '✅ Активен';
                else if (owned) statusText = '✔️ Владелец';
                else statusText = `💰 ${skin.price} монет`;

                let btnText = '';
                if (isDefault) btnText = '✅';
                else if (owned && isActive) btnText = '✅';
                else if (owned) btnText = 'Выбрать';
                else btnText = 'Купить';

                let btnClass = 'buy-btn';
                if (isDefault || (owned && isActive)) btnClass += ' owned-btn active-skin';
                else if (owned) btnClass += ' owned-btn';
                else if (!canBuy) btnClass += ' disabled';

                div.innerHTML = `
                            <div class="info">
                                <span class="name">${skin.name}</span>
                                <span class="${owned || isDefault ? 'owned' : 'price'}">${statusText}</span>
                                ${bonusText ? `<span class="bonus">${bonusText}</span>` : ''}
                            </div>
                            <button class="${btnClass}" data-skin-id="${skin.id}" ${!canBuy && !owned && !isDefault ? 'disabled' : ''}>
                                ${btnText}
                            </button>
                        `;

                const btn = div.querySelector('.buy-btn');
                btn.addEventListener('click', () => handleSkinAction(skin.id));

                skinList.appendChild(div);
            });
        }

        function handleSkinAction(skinId) {
            const skin = SKINS.find(s => s.id === skinId);
            if (!skin) return;

            if (state.ownedSkins.includes(skinId)) {
                state.skin = skinId;
                updateUI();
                renderSkins();
                showToast(`✅ Скин "${skin.name}" применён! Бонус: +${Math.round((skin.bonus - 1) * 100)}%`, 'success');
                return;
            }

            if (skinId === 'default') {
                state.skin = 'default';
                updateUI();
                renderSkins();
                showToast(`✅ Скин "${skin.name}" применён!`, 'success');
                return;
            }

            if (state.coins < skin.price) {
                showToast(`⛔ Не хватает монет! Нужно ${skin.price}`, 'error');
                return;
            }

            state.coins -= skin.price;
            state.ownedSkins.push(skinId);
            state.skin = skinId;
            updateUI();
            renderSkins();
            showToast(`🎉 Куплен скин "${skin.name}"! +${Math.round((skin.bonus - 1) * 100)}% к заработку!`, 'success', 2500);
            spawnCoins(window.innerWidth / 2, window.innerHeight / 2, 12);

            tg.sendData(JSON.stringify({
                action: 'buy_skin',
                skin_id: skinId,
                price: skin.price
            }));
        }

        // ============= КЛИК =============
        function handleClick(e) {
            if (state.energy <= 0) {
                showToast('⛔ Нет энергии! Жди восстановления', 'error');
                return;
            }

            const now = Date.now();
            if (now - state.lastClickTime < 100) state.comboCount += 1;
            else state.comboCount = 1;
            state.lastClickTime = now;

            // Базовый заработок — ВСЕГДА даёт монеты!
            let earned = Math.floor(Math.random() * 5) + 1 + Math.floor(state.comboCount / 10);
            // Применяем бонус от скина (для обычного скина бонус = 1)
            const bonus = getSkinBonus();
            earned = Math.floor(earned * bonus);

            state.coins += earned;
            state.energy -= 1;
            state.clicks += 1;
            state.earnedToday += earned;
            state.exp += 1;

            if (state.exp >= state.expToNext) {
                state.level += 1;
                state.exp = 0;
                state.expToNext = state.level * 100;
                showToast(`🎉 НОВЫЙ УРОВЕНЬ ${state.level}!`, 'level-up', 2500);
                spawnCoins(window.innerWidth / 2, window.innerHeight / 2, 15);
                spawnSparkles(window.innerWidth / 2, window.innerHeight / 2, 20);
            }

            const rect = clickArea.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;

            const emojis = ['✨', '⭐', '💫', '🌟', '🔥'];
            spawnClickEffect(
                cx + (Math.random() - 0.5) * 60,
                cy + (Math.random() - 0.5) * 60,
                emojis[Math.floor(Math.random() * emojis.length)]
            );
            spawnSparkles(cx, cy, 4);
            spawnCoins(cx, cy, 2);

            tg.sendData(JSON.stringify({ action: 'click', earned: earned }));

            updateUI();

            const bonusText = bonus > 1 ? ` (x${bonus.toFixed(1)})` : '';
            showToast(`+${earned} 🪙${bonusText}`, 'success', 600);
        }

        // ============= ВОССТАНОВЛЕНИЕ ЭНЕРГИИ =============
        function boostEnergy() {
            if (state.coins < 10) {
                showToast('⛔ Нужно 10 монет!', 'error');
                return;
            }
            if (state.energy >= state.maxEnergy) {
                showToast('⚡ Энергия уже полная!', 'error');
                return;
            }
            state.coins -= 10;
            state.energy = state.maxEnergy;
            updateUI();
            showToast('⚡ Энергия восстановлена!', 'success');
            tg.sendData(JSON.stringify({ action: 'boost_energy' }));
        }

        // ============= АВТО-ВОССТАНОВЛЕНИЕ =============
        setInterval(() => {
            if (state.energy < state.maxEnergy) {
                state.energy += 1;
                if (state.energy > state.maxEnergy) state.energy = state.maxEnergy;
                updateUI();
            }
        }, 30000);

        // ============= СОХРАНЕНИЕ =============
        function saveState() {
            localStorage.setItem('guild_state', JSON.stringify(state));
        }

        function loadState() {
            const saved = localStorage.getItem('guild_state');
            if (saved) {
                const data = JSON.parse(saved);
                Object.assign(state, data);
                updateUI();
            }
        }

        // ============= ЕЖЕДНЕВНЫЙ СБРОС =============
        const today = new Date().toDateString();
        if (localStorage.getItem('guild_reset') !== today) {
            state.earnedToday = 0;
            localStorage.setItem('guild_reset', today);
        }

        // ============= СОБЫТИЯ =============
        clickArea.addEventListener('click', handleClick);
        $('boostBtn').addEventListener('click', boostEnergy);
        $('shopBtn').addEventListener('click', openShop);
        closeShop.addEventListener('click', closeShopModal);
        shopModal.addEventListener('click', (e) => {
            if (e.target === shopModal) closeShopModal();
        });
        $('wordBtn').addEventListener('click', initWordGame);
        wordGuessBtn.addEventListener('click', guessWord);
        wordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') guessWord();
        });
        wordCloseBtn.addEventListener('click', closeWordGame);
        wordOverlay.addEventListener('click', (e) => {
            if (e.target === wordOverlay) closeWordGame();
        });
        $('statsBtn').addEventListener('click', () => {
            const bonus = getSkinBonus();
            showToast(
                `📊 Кликов: ${state.clicks} | Комбо: ${state.comboCount}\n` +
                `🎨 Скин: ${state.skin} | Бонус: x${bonus.toFixed(1)}`,
                'success', 2500
            );
        });

        // ============= ЗАПУСК =============
        loadState();
        setInterval(saveState, 10000);

        console.log('⚔️ Gold Epoch запущена!');
        console.log('💰 Баланс:', state.coins);
        console.log('🎨 Скинов:', state.ownedSkins.length);
        console.log('🔥 Бонус:', getSkinBonus());
    </script>
</body>
</html>
