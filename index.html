<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Эпоха Империй</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <style>
        /* ============ БАЗА ============ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a12;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            background-image: radial-gradient(ellipse at top, #1a1a2e 0%, #0a0a12 70%);
            user-select: none;
            overflow: hidden;
        }
        .game-container {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 16px 14px 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        /* ============ ШАПКА ============ */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 4px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        .header-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            font-weight: 600;
            color: #8395a7;
        }
        .header-item .value {
            color: #ffd700;
            font-size: 15px;
            min-width: 30px;
        }
        .header-item .icon {
            font-size: 16px;
        }

        /* ============ ЭПОХА ============ */
        .era-display {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 6px 12px;
            margin: 8px 0 4px;
            border: 1px solid rgba(255, 215, 0, 0.08);
        }
        .era-display .era-icon {
            font-size: 20px;
        }
        .era-display .era-name {
            font-size: 14px;
            font-weight: 800;
            color: #ffd700;
        }
        .era-display .era-level {
            font-size: 11px;
            color: #8395a7;
        }
        .era-display .era-next {
            font-size: 10px;
            color: #636e72;
        }

        /* ============ ПРОГРЕСС ============ */
        .level-progress {
            margin: 6px 0 4px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 4px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .level-progress .level-text {
            font-size: 11px;
            font-weight: 700;
            color: #8395a7;
            white-space: nowrap;
            min-width: 50px;
        }
        .level-progress .level-text span {
            color: #ffd700;
        }
        .level-progress .level-bar {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
        }
        .level-progress .level-fill {
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            transition: width 0.3s ease;
            width: 0%;
        }
        .level-progress .level-percent {
            font-size: 10px;
            color: #8395a7;
            min-width: 35px;
            text-align: right;
        }

        /* ============ БАННЕР БУСТА ============ */
        .boost-banner {
            margin: 4px 0 6px;
            padding: 4px 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.1);
            min-height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .boost-banner.active {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border-color: #ff6b6b;
            animation: boostPulse 0.5s ease-in-out infinite alternate;
        }
        @keyframes boostPulse {
            from {
                opacity: 0.8;
                transform: scale(1);
            }
            to {
                opacity: 1;
                transform: scale(1.02);
            }
        }

        /* ============ КЛИК ============ */
        .click-wrapper {
            position: relative;
            margin: 8px auto 6px;
            width: 170px;
            height: 170px;
        }
        .click-area {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #2a2a5e, #0f0f1f);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 2.5px solid rgba(255, 215, 0, 0.25);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.04), inset 0 -4px 15px rgba(0, 0, 0, 0.4);
            transition: transform 0.07s, box-shadow 0.07s;
            position: relative;
            user-select: none;
            will-change: transform;
        }
        .click-area::before {
            content: '';
            position: absolute;
            inset: -2.5px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #ffd700, #ff6b6b, #ffd700);
            opacity: 0.15;
            z-index: -1;
            animation: rotateBorder 8s linear infinite;
        }
        @keyframes rotateBorder {
            to {
                transform: rotate(360deg);
            }
        }
        .click-area:active {
            transform: scale(0.93);
            border-color: #ffd700;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.1);
        }
        .click-area .emoji {
            font-size: 50px;
            line-height: 1;
            filter: drop-shadow(0 2px 15px rgba(255, 215, 0, 0.15));
            transition: transform 0.07s;
            will-change: transform;
        }
        .click-area:active .emoji {
            transform: scale(1.05);
        }
        .click-area .text {
            font-size: 10px;
            font-weight: 700;
            margin-top: 2px;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.05);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .click-area .badge {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(255, 215, 0, 0.12);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 9px;
            font-weight: 700;
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.06);
        }
        .click-area .boost-multiplier {
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            font-weight: 800;
            color: #ff6b6b;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
        }

        /* ============ ЛЕТАЮЩИЕ МОНЕТЫ ============ */
        .fly-coin {
            position: fixed;
            pointer-events: none;
            z-index: 999;
            font-size: 24px;
            font-weight: 800;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            animation: flyCoin 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            will-change: transform, opacity;
        }
        @keyframes flyCoin {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(1.2);
            }
        }

        /* ============ СТАТИСТИКА ============ */
        .stats {
            display: flex;
            justify-content: space-between;
            padding: 4px 4px 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .stats .item {
            text-align: center;
        }
        .stats .item .num {
            font-size: 16px;
            font-weight: 800;
            color: #ffd700;
            display: block;
            line-height: 1.2;
        }
        .stats .item .label {
            font-size: 9px;
            color: #8395a7;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* ============ ЭНЕРГИЯ ============ */
        .energy-section {
            margin: 6px 0 8px;
        }
        .energy-header {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #8395a7;
            padding: 0 2px;
        }
        .energy-header .current {
            color: #ffd700;
            font-weight: 600;
        }
        .energy-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            overflow: hidden;
        }
        .energy-fill {
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            transition: width 0.3s ease;
            width: 100%;
        }

        /* ============ НИЖНЕЕ МЕНЮ ============ */
        .bottom-menu {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 4px;
            margin-top: 6px;
        }
        .bottom-menu .btn {
            background: rgba(255, 255, 255, 0.03);
            border: none;
            border-radius: 12px;
            padding: 10px 2px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.1s;
            color: #8395a7;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            will-change: transform;
        }
        .bottom-menu .btn:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.06);
        }
        .bottom-menu .btn .label {
            font-size: 7px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #636e72;
        }
        .bottom-menu .btn.active {
            color: #ffd700;
            border-color: rgba(255, 215, 0, 0.08);
            background: rgba(255, 215, 0, 0.04);
        }
        .bottom-menu .btn.raid {
            color: #fd79a8;
            animation: raidPulse 2s ease-in-out infinite;
        }
        @keyframes raidPulse {
            0%,
            100% {
                opacity: 0.8;
            }
            50% {
                opacity: 1;
            }
        }

        /* ============ МОДАЛКИ ============ */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 14px;
            animation: fadeIn 0.2s ease;
        }
        .modal-overlay.active {
            display: flex;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: #16162e;
            border-radius: 24px;
            padding: 16px 14px;
            max-width: 400px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            animation: slideUp 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes slideUp {
            from {
                transform: translateY(15px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal .head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .modal .head h2 {
            color: #ffd700;
            font-size: 17px;
            font-weight: 700;
        }
        .modal .head .close {
            background: none;
            border: none;
            color: #8395a7;
            font-size: 20px;
            cursor: pointer;
            padding: 0 4px;
        }
        .modal .head .close:active {
            color: #ff6b6b;
        }
        .modal .balance {
            text-align: center;
            color: #8395a7;
            font-size: 12px;
            margin-bottom: 10px;
        }
        .modal .balance span {
            color: #ffd700;
            font-weight: 700;
        }

        /* ============ БУСТЫ В МАГАЗИНЕ ============ */
        .boost-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 10px 14px;
            margin-bottom: 6px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .boost-item .info .name {
            font-size: 14px;
            font-weight: 700;
            color: #c8d6e5;
        }
        .boost-item .info .desc {
            font-size: 10px;
            color: #8395a7;
        }
        .boost-item .info .desc .highlight {
            color: #ffd700;
        }
        .boost-item .action-btn {
            background: linear-gradient(135deg, #ffd700, #f0a500);
            border: none;
            border-radius: 10px;
            padding: 5px 14px;
            font-size: 11px;
            font-weight: 700;
            color: #0a0a12;
            cursor: pointer;
            transition: transform 0.07s;
        }
        .boost-item .action-btn:active {
            transform: scale(0.92);
        }
        .boost-item .action-btn.disabled {
            background: #2d3436;
            color: #636e72;
            cursor: not-allowed;
        }
        .boost-item .action-btn.active {
            background: #ff6b6b;
            color: #fff;
            cursor: default;
        }

        /* ============ ЗДАНИЯ / ВОЙСКА / ТЕХНОЛОГИИ ============ */
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            padding: 8px 12px;
            margin-bottom: 5px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }
        .item .info .name {
            font-size: 13px;
            font-weight: 600;
            color: #c8d6e5;
        }
        .item .info .desc {
            font-size: 10px;
            color: #8395a7;
        }
        .item .info .desc .highlight {
            color: #ffd700;
        }
        .item .action-btn {
            background: linear-gradient(135deg, #ffd700, #f0a500);
            border: none;
            border-radius: 10px;
            padding: 4px 14px;
            font-size: 11px;
            font-weight: 700;
            color: #0a0a12;
            cursor: pointer;
            transition: transform 0.07s;
        }
        .item .action-btn:active {
            transform: scale(0.92);
        }
        .item .action-btn.owned {
            background: #00b894;
            color: #fff;
            cursor: default;
        }
        .item .action-btn.disabled {
            background: #2d3436;
            color: #636e72;
            cursor: not-allowed;
        }
        .item .action-btn.locked {
            background: #6c5ce7;
            color: #fff;
            cursor: not-allowed;
        }

        /* ============ НАБЕГ ============ */
        .raid-result {
            text-align: center;
            padding: 14px;
            border-radius: 14px;
            margin: 8px 0;
        }
        .raid-result.win {
            background: rgba(0, 184, 148, 0.12);
            border: 1px solid rgba(0, 184, 148, 0.2);
        }
        .raid-result.lose {
            background: rgba(255, 107, 107, 0.12);
            border: 1px solid rgba(255, 107, 107, 0.2);
        }
        .raid-result .big {
            font-size: 22px;
            font-weight: 800;
        }
        .raid-result .big.win {
            color: #00b894;
        }
        .raid-result .big.lose {
            color: #ff6b6b;
        }

        /* ============ ТОСТЫ ============ */
        .toast-container {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            pointer-events: none;
        }
        .toast {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            margin-top: 3px;
            animation: toastIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
            min-width: 120px;
            max-width: 85%;
        }
        .toast.success {
            border-color: rgba(0, 184, 148, 0.2);
        }
        .toast.error {
            border-color: rgba(255, 107, 107, 0.2);
        }
        .toast.level {
            border-color: rgba(255, 215, 0, 0.2);
            background: rgba(255, 215, 0, 0.05);
            font-size: 14px;
        }
        .toast.boost {
            border-color: rgba(255, 107, 107, 0.2);
            background: rgba(255, 107, 107, 0.05);
            font-size: 14px;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-12px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0) scale(1);
            }
        }
        .toast.fade-out {
            animation: toastOut 0.2s ease forwards;
        }
        @keyframes toastOut {
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px) scale(0.95);
            }
        }

        @media (max-width: 380px) {
            .click-wrapper {
                width: 140px;
                height: 140px;
            }
            .click-area .emoji {
                font-size: 40px;
            }
            .bottom-menu .btn {
                font-size: 15px;
                padding: 8px 2px;
            }
            .bottom-menu .btn .label {
                font-size: 6px;
            }
            .header-item {
                font-size: 11px;
            }
            .header-item .value {
                font-size: 13px;
            }
            .era-display .era-name {
                font-size: 12px;
            }
        }
        @media (min-width: 460px) {
            .click-wrapper {
                width: 200px;
                height: 200px;
            }
            .click-area .emoji {
                font-size: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container" id="app">
        <!-- ============ ШАПКА ============ -->
        <div class="header">
            <div class="header-item"><span class="icon">🏆</span><span class="value" id="level">1</span></div>
            <div class="header-item"><span class="icon">💰</span><span class="value" id="coins">150</span></div>
            <div class="header-item"><span class="icon">⚡</span><span class="value" id="energyDisplay">100</span></div>
        </div>

        <!-- ============ ЭПОХА ============ -->
        <div class="era-display">
            <span class="era-icon" id="eraIcon">🏚️</span>
            <span class="era-name" id="eraName">Деревня</span>
            <span class="era-level" id="eraLevel">1-4</span>
            <span class="era-next" id="eraNext">След: Lv.5</span>
        </div>

        <!-- ============ ПРОГРЕСС ============ -->
        <div class="level-progress">
            <div class="level-text">Lv.<span id="levelDisplay">1</span></div>
            <div class="level-bar"><div class="level-fill" id="levelProgressFill" style="width:0%"></div></div>
            <div class="level-percent" id="levelPercent">0%</div>
        </div>

        <!-- ============ БАННЕР БУСТА ============ -->
        <div class="boost-banner" id="boostBanner">💪 Купи усиление в магазине!</div>

        <!-- ============ КЛИК ============ -->
        <div class="click-wrapper">
            <div class="click-area" id="clickArea">
                <span class="badge" id="badge">Lv.1</span>
                <span class="emoji" id="clickEmoji">⚔️</span>
                <span class="text">ТАПАЙ</span>
                <span class="boost-multiplier" id="boostMultiplier"></span>
            </div>
        </div>

        <!-- ============ СТАТИСТИКА ============ -->
        <div class="stats">
            <div class="item"><span class="num" id="clicks">0</span><span class="label">Кликов</span></div>
            <div class="item"><span class="num" id="power">0</span><span class="label">Мощь</span></div>
            <div class="item"><span class="num" id="today">0</span><span class="label">За день</span></div>
        </div>

        <!-- ============ ЭНЕРГИЯ ============ -->
        <div class="energy-section">
            <div class="energy-header"><span>⚡ Энергия</span><span class="current"><span id="energyCurrent">100</span>/100</span></div>
            <div class="energy-bar"><div class="energy-fill" id="energyFill" style="width:100%"></div></div>
        </div>

        <!-- ============ НИЖНЕЕ МЕНЮ ============ -->
        <div class="bottom-menu">
            <button class="btn" id="buildBtn">🏠<span class="label">Город</span></button>
            <button class="btn" id="armyBtn">⚔️<span class="label">Войска</span></button>
            <button class="btn" id="techBtn">🔬<span class="label">Технологии</span></button>
            <button class="btn active" id="shopBtn">🛒<span class="label">Магазин</span></button>
            <button class="btn raid" id="raidBtn">⚡<span class="label">Набег</span></button>
            <button class="btn" id="airdropBtn">💎<span class="label">Airdrop</span></button>
        </div>
    </div>

    <!-- ============ МОДАЛКИ ============ -->
    <div class="modal-overlay" id="shopModal"><div class="modal"><div class="head"><h2>🛒 Магазин усилений</h2><button class="close" id="closeShop">✕</button></div><div class="balance">💰 <span id="shopBalance">150</span></div><div id="shopList"></div></div></div>
    <div class="modal-overlay" id="buildModal"><div class="modal"><div class="head"><h2>🏠 Город</h2><button class="close" id="closeBuild">✕</button></div><div class="balance">💰 <span id="buildBalance">150</span></div><div id="buildList"></div></div></div>
    <div class="modal-overlay" id="armyModal"><div class="modal"><div class="head"><h2>⚔️ Войска</h2><button class="close" id="closeArmy">✕</button></div><div class="balance">💰 <span id="armyBalance">150</span></div><div id="armyList"></div></div></div>
    <div class="modal-overlay" id="techModal"><div class="modal"><div class="head"><h2>🔬 Технологии</h2><button class="close" id="closeTech">✕</button></div><div class="balance">💰 <span id="techBalance">150</span></div><div id="techList"></div></div></div>
    <div class="modal-overlay" id="raidModal"><div class="modal"><div class="head"><h2>⚡ Набег</h2><button class="close" id="closeRaid">✕</button></div><div id="raidContent"></div></div></div>
    <div class="modal-overlay" id="airdropModal"><div class="modal"><div class="head"><h2>💎 Airdrop</h2><button class="close" id="closeAirdrop">✕</button></div><div id="airdropContent"></div></div></div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // ============= ЭПОХИ =============
        const ERAS = [
            { id: 0, name: 'Деревня', icon: '🏚️', minLevel: 1, maxLevel: 4 },
            { id: 1, name: 'Каменный век', icon: '🪨', minLevel: 5, maxLevel: 9 },
            { id: 2, name: 'Бронзовый век', icon: '⚒️', minLevel: 10, maxLevel: 14 },
            { id: 3, name: 'Железный век', icon: '🏛️', minLevel: 15, maxLevel: 19 },
            { id: 4, name: 'Феодализм', icon: '⚜️', minLevel: 20, maxLevel: 24 },
            { id: 5, name: 'Ренессанс', icon: '👑', minLevel: 25, maxLevel: 29 },
            { id: 6, name: 'Просвещение', icon: '🚀', minLevel: 30, maxLevel: 34 },
            { id: 7, name: 'Империя', icon: '💎', minLevel: 35, maxLevel: 39 },
            { id: 8, name: 'Золотой век', icon: '🌌', minLevel: 40, maxLevel: 999 }
        ];

        function getEra(level) {
            for (let era of ERAS) {
                if (level >= era.minLevel && level <= era.maxLevel) return era;
            }
            return ERAS[ERAS.length - 1];
        }

        function getNextEra(level) {
            for (let era of ERAS) {
                if (level < era.minLevel) return era;
            }
            return null;
        }

        // ============= ДАННЫЕ =============
        const MAX_LEVEL = 100;

        const BOOSTS = [
            { id: 'x2_1min', name: '⚡ Быстрый клик', price: 500, multiplier: 2, duration: 60, desc: 'x2 монет на 1 минуту' },
            { id: 'x3_1min', name: '🔥 Огненный тап', price: 1000, multiplier: 3, duration: 60, desc: 'x3 монет на 1 минуту' },
            { id: 'x5_1min', name: '💎 Легендарный тап', price: 2500, multiplier: 5, duration: 60,
            desc: 'x5 монет на 1 минуту' },
            { id: 'x2_5min', name: '⏳ Замедление', price: 3000, multiplier: 2, duration: 300, desc: 'x2 монет на 5 минут' },
            { id: 'x10_30sec', name: '🚀 Режим бога', price: 10000, multiplier: 10, duration: 30,
            desc: 'x10 монет на 30 секунд' }
        ];

        const BUILDINGS = [
            { id: 'hut', name: 'Хижина', price: 100, minLevel: 1, power: 1, passive: 0 },
            { id: 'house', name: 'Дом', price: 500, minLevel: 2, power: 3, passive: 5 },
            { id: 'quarter', name: 'Квартал', price: 2000, minLevel: 4, power: 8, passive: 20 },
            { id: 'townhall', name: 'Ратуша', price: 5000, minLevel: 6, power: 15, passive: 50 },
            { id: 'castle', name: 'Замок', price: 15000, minLevel: 10, power: 30, passive: 100 },
            { id: 'citadel', name: 'Цитадель', price: 50000, minLevel: 15, power: 60, passive: 250 }
        ];

        const ARMY = [
            { id: 'militia', name: 'Ополченец', price: 200, minLevel: 1, power: 2, bonus: 0 },
            { id: 'swordsman', name: 'Мечник', price: 800, minLevel: 3, power: 5, bonus: 10 },
            { id: 'archer', name: 'Лучник', price: 2000, minLevel: 5, power: 10, bonus: 15 },
            { id: 'knight', name: 'Рыцарь', price: 5000, minLevel: 8, power: 20, bonus: 25 },
            { id: 'paladin', name: 'Паладин', price: 12000, minLevel: 12, power: 35, bonus: 40 },
            { id: 'royal_guard', name: 'Гвардия', price: 25000, minLevel: 16, power: 55, bonus: 60 }
        ];

        const TECHNOLOGIES = [
            { id: 'writing', name: 'Письменность', price: 500, minLevel: 2, effect: '+5% монет' },
            { id: 'metallurgy', name: 'Металлургия', price: 1500, minLevel: 4, effect: '+10% защита' },
            { id: 'architecture', name: 'Архитектура', price: 3000, minLevel: 6, effect: '-20% стройка' },
            { id: 'alchemy', name: 'Алхимия', price: 5000, minLevel: 8, effect: '+2 мон/клик' },
            { id: 'astrology', name: 'Астрология', price: 10000, minLevel: 10, effect: 'x2 здания' },
            { id: 'engineering', name: 'Инженерия', price: 18000, minLevel: 13, effect: '+50% реген' },
            { id: 'diplomacy', name: 'Дипломатия', price: 30000, minLevel: 17, effect: '+30% набеги' }
        ];

        // ============= ФУНКЦИИ =============
        function getExpForLevel(lvl) {
            if (lvl <= 1) return 0;
            return 1000 + (lvl - 2) * 200;
        }

        function getExpForNext() {
            if (state.level >= MAX_LEVEL) return Infinity;
            return getExpForLevel(state.level + 1);
        }

        function calcPower() {
            let p = 0;
            for (const [id, lvl] of Object.entries(state.buildings)) {
                const b = BUILDINGS.find(b => b.id === id);
                if (b) p += b.power * lvl;
            }
            for (const [id, cnt] of Object.entries(state.army)) {
                const a = ARMY.find(a => a.id === id);
                if (a) p += a.power * cnt;
            }
            p += state.technologies.length * 3;
            return p;
        }

        function getPassiveIncome() {
            let inc = 0;
            for (const [id, lvl] of Object.entries(state.buildings)) {
                const b = BUILDINGS.find(b => b.id === id);
                if (b) inc += b.passive * lvl;
            }
            return inc;
        }

        // ============= СОСТОЯНИЕ =============
        const state = {
            coins: 150,
            energy: 100,
            maxEnergy: 100,
            level: 1,
            exp: 0,
            clicks: 0,
            earnedToday: 0,
            buildings: {},
            army: {},
            technologies: [],
            raidCooldown: 0,
            boostActive: null,
            boostTimer: null
        };

        // ============= DOM =============
        const $ = id => document.getElementById(id);
        const coinsEl = $('coins');
        const energyDisplay = $('energyDisplay');
        const energyFill = $('energyFill');
        const energyCurrent = $('energyCurrent');
        const levelEl = $('level');
        const levelDisplay = $('levelDisplay');
        const levelProgressFill = $('levelProgressFill');
        const levelPercent = $('levelPercent');
        const badge = $('badge');
        const clickEmoji = $('clickEmoji');
        const clicksEl = $('clicks');
        const powerEl = $('power');
        const todayEl = $('today');
        const clickArea = $('clickArea');
        const container = $('app');
        const eraIcon = $('eraIcon');
        const eraName = $('eraName');
        const eraLevel = $('eraLevel');
        const eraNext = $('eraNext');
        const boostBanner = $('boostBanner');
        const boostMultiplier = $('boostMultiplier');

        // ============= ТОСТЫ =============
        let toastTimer = null;

        function toast(text, type = 'success', duration = 1500) {
            const c = $('toastContainer');
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = text;
            c.appendChild(el);
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                el.classList.add('fade-out');
                setTimeout(() => el.remove(), 200);
                toastTimer = null;
            }, duration);
        }

        // ============= ЛЕТАЮЩИЕ МОНЕТЫ =============
        function flyCoin(x, y, text) {
            const el = document.createElement('div');
            el.className = 'fly-coin';
            el.textContent = text;
            el.style.left = (x - 15) + 'px';
            el.style.top = (y - 15) + 'px';
            el.style.setProperty('--tx', (Math.random() - 0.5) * 120 + 'px');
            el.style.setProperty('--ty', -Math.random() * 120 - 40 + 'px');
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 900);
        }

        // ============= ОБНОВЛЕНИЕ UI =============
        function updateUI() {
            coinsEl.textContent = Math.floor(state.coins);
            energyDisplay.textContent = Math.floor(state.energy);
            energyCurrent.textContent = Math.floor(state.energy);
            energyFill.style.width = Math.min(100, (state.energy / state.maxEnergy) * 100) + '%';
            levelEl.textContent = state.level;
            levelDisplay.textContent = state.level;
            badge.textContent = 'Lv.' + state.level;

            const expNeeded = getExpForNext();
            if (state.level >= MAX_LEVEL) {
                levelProgressFill.style.width = '100%';
                levelPercent.textContent = 'MAX';
            } else {
                const p = Math.min(100, (state.exp / expNeeded) * 100);
                levelProgressFill.style.width = p + '%';
                levelPercent.textContent = Math.floor(p) + '%';
            }

            clicksEl.textContent = state.clicks;
            powerEl.textContent = calcPower();
            todayEl.textContent = state.earnedToday;

            // Эпоха
            const era = getEra(state.level);
            const nextEra = getNextEra(state.level);
            eraIcon.textContent = era.icon;
            eraName.textContent = era.name;
            eraLevel.textContent = era.minLevel + '-' + (era.maxLevel > 999 ? '∞' : era.maxLevel);
            if (nextEra) {
                eraNext.textContent = 'След: Lv.' + nextEra.minLevel;
            } else {
                eraNext.textContent = 'Максимум!';
            }

            // Буст баннер
            if (state.boostActive) {
                const boost = BOOSTS.find(b => b.id === state.boostActive);
                if (boost) {
                    boostBanner.textContent = '🔥 ' + boost.name + ' активен! x' + boost.multiplier;
                    boostBanner.className = 'boost-banner active';
                    boostMultiplier.textContent = 'x' + boost.multiplier;
                }
            } else {
                boostBanner.textContent = '💪 Купи усиление в магазине!';
                boostBanner.className = 'boost-banner';
                boostMultiplier.textContent = '';
            }
        }

        // ============= ПРОВЕРКА УРОВНЯ =============
        function checkLevelUp() {
            if (state.level >= MAX_LEVEL) return false;
            const needed = getExpForNext();
            if (state.exp >= needed) {
                state.exp -= needed;
                state.level += 1;
                const era = getEra(state.level);
                toast('🎉 Lv.' + state.level + '! ' + era.icon + ' ' + era.name, 'level', 2000);
                if (state.level === MAX_LEVEL) {
                    toast('👑 МАКСИМАЛЬНЫЙ УРОВЕНЬ!', 'level', 3000);
                }
                updateUI();
                return true;
            }
            return false;
        }

        // ============= КЛИК =============
        function handleClick(e) {
            if (state.energy <= 0) {
                toast('⛔ Нет энергии', 'error', 800);
                return;
            }

            let multiplier = 1;
            if (state.boostActive) {
                const boost = BOOSTS.find(b => b.id === state.boostActive);
                if (boost) multiplier = boost.multiplier;
            }

            let earned = Math.floor(Math.random() * 4) + 2;
            earned = Math.floor(earned * multiplier);

            state.coins += earned;
            state.energy -= 1;
            state.clicks += 1;
            state.earnedToday += earned;
            if (state.level < MAX_LEVEL) {
                state.exp += 1;
                checkLevelUp();
            }

            const rect = clickArea.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;

            const text = multiplier > 1 ? '+' + earned + '🔥' : '+' + earned;
            flyCoin(cx + (Math.random() - 0.5) * 60, cy + (Math.random() - 0.5) * 60, text);

            updateUI();
            if (state.clicks % 3 === 0) {
                toast('+' + earned + ' 🪙', 'success', 500);
            }
        }

        // ============= МОДАЛКИ =============
        function openModal(id) { $(id).classList.add('active'); }

        function closeModal(id) { $(id).classList.remove('active'); }

        // ============= МАГАЗИН БУСТОВ =============
        function openShop() {
            const list = $('shopList');
            list.innerHTML = '';
            BOOSTS.forEach(boost => {
                const isActive = state.boostActive === boost.id;
                const canBuy = state.coins >= boost.price && !isActive;

                const div = document.createElement('div');
                div.className = 'boost-item';
                div.innerHTML = `
                    <div class="info">
                        <div class="name">${boost.name}</div>
                        <div class="desc">${boost.desc}</div>
                        <div class="desc">💰 ${boost.price} монет</div>
                    </div>
                    <button class="action-btn ${isActive ? 'active' : (!canBuy ? 'disabled' : '')}" ${isActive || !canBuy ? 'disabled' : ''}>
                        ${isActive ? '✅ Активен' : 'Купить'}
                    </button>
                `;
                const btn = div.querySelector('.action-btn');
                btn.addEventListener('click', () => {
                    if (isActive) return;
                    if (state.coins < boost.price) { toast('⛔ Нет монет', 'error', 800); return; }
                    // Активируем буст
                    state.coins -= boost.price;
                    state.boostActive = boost.id;
                    if (state.boostTimer) clearTimeout(state.boostTimer);
                    state.boostTimer = setTimeout(() => {
                        state.boostActive = null;
                        state.boostTimer = null;
                        updateUI();
                        toast('⏳ Усиление закончилось!', 'error', 2000);
                    }, boost.duration * 1000);
                    updateUI();
                    openShop();
                    toast('🔥 ' + boost.name + ' активирован! x' + boost.multiplier, 'boost', 2000);
                });
                list.appendChild(div);
            });
            $('shopBalance').textContent = state.coins;
            openModal('shopModal');
        }

        // ============= ГОРОД =============
        function openBuild() {
            const list = $('buildList');
            list.innerHTML = '';
            BUILDINGS.forEach(b => {
                const lvl = state.buildings[b.id] || 0;
                const era = getEra(state.level);
                const can = state.coins >= b.price && state.level >= b.minLevel;

                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="info">
                        <div class="name">${b.name} <span style="color:#8395a7;font-size:10px;">Ур.${lvl}</span></div>
                        <div class="desc">⚔️ +${b.power} ${b.passive > 0 ? '💰 +' + b.passive + '/ч' : ''}</div>
                        <div class="desc">🔒 ${era.icon} ${era.name}</div>
                    </div>
                    <button class="action-btn ${!can ? 'disabled' : ''}" ${!can ? 'disabled' : ''}>
                        ${lvl > 0 ? '⬆️' : '🏗️'} ${b.price}💰
                    </button>
                `;
                const btn = div.querySelector('.action-btn');
                btn.addEventListener('click', () => {
                    if (state.coins < b.price) { toast('⛔ Нет монет', 'error', 800); return; }
                    if (state.level < b.minLevel) { toast('⛔ Требуется Lv.' + b.minLevel, 'error', 800); return; }
                    state.coins -= b.price;
                    state.buildings[b.id] = (state.buildings[b.id] || 0) + 1;
                    updateUI();
                    openBuild();
                    toast('🏗️ ' + b.name, 'success', 800);
                });
                list.appendChild(div);
            });
            $('buildBalance').textContent = state.coins;
            openModal('buildModal');
        }

        // ============= ВОЙСКА =============
        function openArmy() {
            const list = $('armyList');
            list.innerHTML = '';
            ARMY.forEach(a => {
                const cnt = state.army[a.id] || 0;
                const can = state.coins >= a.price && state.level >= a.minLevel;

                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="info">
                        <div class="name">${a.name} <span style="color:#8395a7;font-size:10px;">${cnt} шт</span></div>
                        <div class="desc">⚔️ +${a.power} ${a.bonus > 0 ? '🔥 +' + a.bonus + '%' : ''}</div>
                    </div>
                    <button class="action-btn ${!can ? 'disabled' : ''}" ${!can ? 'disabled' : ''}>
                        ${a.price}💰
                    </button>
                `;
                const btn = div.querySelector('.action-btn');
                btn.addEventListener('click', () => {
                    if (state.coins < a.price) { toast('⛔ Нет монет', 'error', 800); return; }
                    if (state.level < a.minLevel) { toast('⛔ Требуется Lv.' + a.minLevel, 'error', 800); return; }
                    state.coins -= a.price;
                    state.army[a.id] = (state.army[a.id] || 0) + 1;
                    updateUI();
                    openArmy();
                    toast('⚔️ ' + a.name, 'success', 800);
                });
                list.appendChild(div);
            });
            $('armyBalance').textContent = state.coins;
            openModal('armyModal');
        }

        // ============= ТЕХНОЛОГИИ =============
        function openTech() {
            const list = $('techList');
            list.innerHTML = '';
            TECHNOLOGIES.forEach(t => {
                const learned = state.technologies.includes(t.id);
                const can = !learned && state.coins >= t.price && state.level >= t.minLevel;

                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="info">
                        <div class="name">${t.name}</div>
                        <div class="desc">${learned ? '✅' : t.price + '💰'} ${t.effect}</div>
                    </div>
                    <button class="action-btn ${learned ? 'owned' : (!can ? 'disabled' : '')}" ${learned || !can ? 'disabled' : ''}>
                        ${learned ? '✅' : '📖'}
                    </button>
                `;
                const btn = div.querySelector('.action-btn');
                btn.addEventListener('click', () => {
                    if (learned) return;
                    if (state.coins < t.price) { toast('⛔ Нет монет', 'error', 800); return; }
                    if (state.level < t.minLevel) { toast('⛔ Требуется Lv.' + t.minLevel, 'error', 800); return; }
                    state.coins -= t.price;
                    state.technologies.push(t.id);
                    updateUI();
                    openTech();
                    toast('🔬 ' + t.name, 'success', 1000);
                });
                list.appendChild(div);
            });
            $('techBalance').textContent = state.coins;
            openModal('techModal');
        }

        // ============= НАБЕГ =============
        function openRaid() {
            const now = Date.now();
            if (now - state.raidCooldown < 3600000) {
                const left = Math.ceil((3600000 - (now - state.raidCooldown)) / 60000);
                toast('⏳ ' + left + ' мин', 'error', 800);
                return;
            }
            const p = calcPower();
            const enemy = Math.floor(p * (0.5 + Math.random()));
            const win = p > enemy;
            const content = $('raidContent');
            let html = '';
            if (win) {
                const reward = Math.floor(100 + p * 2);
                state.coins += reward;
                html =
                    `<div class="raid-result win"><div class="big win">⚔️ ПОБЕДА!</div><div style="color:#ffd700;">+${reward} 💰</div></div>`;
                toast('⚔️ +' + reward, 'success', 1500);
            } else {
                const loss = Math.floor(50 + p * 0.5);
                state.coins = Math.max(0, state.coins - loss);
                html =
                    `<div class="raid-result lose"><div class="big lose">💀 ПОРАЖЕНИЕ!</div><div style="color:#ff6b6b;">-${loss} 💰</div></div>`;
                toast('💀 -' + loss, 'error', 1500);
            }
            state.raidCooldown = Date.now();
            updateUI();
            content.innerHTML = html +
                `<div style="text-align:center;color:#8395a7;font-size:11px;margin:8px 0;">⏳ 1 час</div>
                <button class="action-btn" style="width:100%;padding:10px;border:none;border-radius:12px;background:rgba(255,255,255,0.04);color:#c8d6e5;font-weight:700;cursor:pointer;" id="raidCloseBtn">✕ Закрыть</button>`;
            document.getElementById('raidCloseBtn').addEventListener('click', () => closeModal('raidModal'));
            openModal('raidModal');
        }

        // ============= AIRDROP =============
        function openAirdrop() {
            const content = $('airdropContent');
            if (state.level >= MAX_LEVEL) {
                content.innerHTML = `
                    <div style="text-align:center;padding:8px;">
                        <div style="font-size:28px;color:#ffd700;font-weight:800;">🎉 100 УРОВЕНЬ!</div>
                        <div style="color:#c8d6e5;margin:8px 0;">🪙 1000 TOKENS</div>
                        <div style="color:#a29bfe;margin:4px 0;">🏆 NFT "Покоритель"</div>
                        <button class="action-btn" style="margin-top:12px;padding:10px 20px;border:none;border-radius:12px;background:linear-gradient(135deg,#ffd700,#f0a500);color:#0a0a12;font-weight:700;font-size:14px;cursor:pointer;" id="claimAirdropBtn">💎 ЗАБРАТЬ</button>
                    </div>
                `;
                document.getElementById('claimAirdropBtn').addEventListener('click', () => {
                    toast('💎 Airdrop получен!', 'success', 3000);
                    closeModal('airdropModal');
                });
            } else {
                const p = Math.floor((state.level / MAX_LEVEL) * 100);
                content.innerHTML = `
                    <div style="text-align:center;padding:8px;">
                        <div style="font-size:28px;">💎</div>
                        <div style="color:#c8d6e5;margin:8px 0;">100 уровень → 1000 токенов + NFT</div>
                        <div style="margin:8px 0;background:rgba(0,0,0,0.2);border-radius:10px;padding:4px;">
                            <div style="height:4px;background:rgba(255,255,255,0.05);border-radius:20px;overflow:hidden;">
                                <div style="height:100%;width:${p}%;background:linear-gradient(90deg,#6c5ce7,#fd79a8);border-radius:20px;"></div>
                            </div>
                        </div>
                        <div style="color:#8395a7;font-size:12px;">${state.level}/${MAX_LEVEL} (${p}%)</div>
                    </div>
                `;
            }
            openModal('airdropModal');
        }

        // ============= АВТОМАТИКА =============
        setInterval(() => {
            if (state.energy < state.maxEnergy) {
                state.energy += 1;
                if (state.energy > state.maxEnergy) state.energy = state.maxEnergy;
                updateUI();
            }
        }, 30000);

        setInterval(() => {
            const inc = getPassiveIncome();
            if (inc > 0) { state.coins += inc;
                updateUI(); }
        }, 60000);

        // ============= СОХРАНЕНИЕ =============
        function saveState() { localStorage.setItem('guild_state', JSON.stringify(state)); }

        function loadState() {
            try {
                const s = localStorage.getItem('guild_state');
                if (s) {
                    const data = JSON.parse(s);
                    Object.assign(state, data);
                    updateUI();
                }
            } catch (e) {}
        }

        const today = new Date().toDateString();
        if (localStorage.getItem('guild_reset') !== today) {
            state.earnedToday = 0;
            localStorage.setItem('guild_reset', today);
        }

        // ============ СОБЫТИЯ =============
        clickArea.addEventListener('click', handleClick);
        $('shopBtn').addEventListener('click', openShop);
        $('closeShop').addEventListener('click', () => closeModal('shopModal'));
        $('shopModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal('shopModal'); });
        $('buildBtn').addEventListener('click', openBuild);
        $('closeBuild').addEventListener('click', () => closeModal('buildModal'));
        $('buildModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal('buildModal'); });
        $('armyBtn').addEventListener('click', openArmy);
        $('closeArmy').addEventListener('click', () => closeModal('armyModal'));
        $('armyModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal('armyModal'); });
        $('techBtn').addEventListener('click', openTech);
        $('closeTech').addEventListener('click', () => closeModal('techModal'));
        $('techModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal('techModal'); });
        $('raidBtn').addEventListener('click', openRaid);
        $('closeRaid').addEventListener('click', () => closeModal('raidModal'));
        $('raidModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal('raidModal'); });
        $('airdropBtn').addEventListener('click', openAirdrop);
        $('closeAirdrop').addEventListener('click', () => closeModal('airdropModal'));
        $('airdropModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal('airdropModal'); });

        // ============ ЗАПУСК =============
        loadState();
        updateUI();
        setInterval(saveState, 15000);

        console.log('⚔️ Эпоха Империй (эпохи по уровням + бусты)');
        console.log('🏆 Уровень:', state.level);
        console.log('🏛️ Эпоха:', getEra(state.level).name);
        console.log('💰 Баланс:', state.coins);
        console.log('🔥 Буст:', state.boostActive || 'нет');
    </script>
